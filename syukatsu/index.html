<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>就活タイプ診断 | CareerType</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080e;
  --surface:rgba(255,255,255,0.04);
  --blue:#3b82f6;
  --blue2:#6366f1;
  --cyan:#06b6d4;
  --green:#10b981;
  --text:#e2e8f0;
  --sub:#94a3b8;
  --card:rgba(15,20,40,0.75);
  --border:rgba(99,102,241,0.25);
}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
canvas#bgc{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── Screens ── */
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;opacity:1;transition:opacity 0.4s,transform 0.4s;overflow-y:auto}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(24px)}

/* ── TOP SCREEN ── */
#screen-top{background:transparent}
.top-wrap{display:flex;flex-direction:column;align-items:center;gap:28px;max-width:480px;width:100%;padding:40px 24px 48px;animation:fadeUp 0.8s cubic-bezier(.16,1,.3,1) both}
.top-badge{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan);background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.25);padding:5px 14px;border-radius:20px}
.top-logo{font-size:clamp(38px,9vw,64px);font-weight:800;letter-spacing:-.02em;line-height:1.1;text-align:center;background:linear-gradient(135deg,#60a5fa 0%,#a78bfa 40%,var(--cyan) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:logoGrad 6s ease-in-out infinite alternate}
@keyframes logoGrad{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(30deg)}}
.top-sub{font-size:13.5px;color:var(--sub);text-align:center;line-height:1.7;max-width:320px}
.top-cards{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.top-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 16px;font-size:12px;color:var(--sub);display:flex;align-items:center;gap:8px;backdrop-filter:blur(12px)}
.top-card .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cta-btn{position:relative;padding:17px 44px;border-radius:16px;border:none;cursor:pointer;font-size:16px;font-weight:700;color:#fff;letter-spacing:.04em;background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 50%,var(--cyan) 100%);box-shadow:0 0 32px rgba(99,102,241,0.35),0 4px 20px rgba(0,0,0,0.5);transition:transform .2s,box-shadow .2s;overflow:hidden;animation:ctaPulse 2.8s ease-in-out infinite}
@keyframes ctaPulse{0%,100%{box-shadow:0 0 32px rgba(99,102,241,0.35),0 4px 20px rgba(0,0,0,0.5)}50%{box-shadow:0 0 50px rgba(99,102,241,0.6),0 4px 28px rgba(0,0,0,0.5)}}
.cta-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 0 50px rgba(99,102,241,0.6),0 8px 30px rgba(0,0,0,0.5)}
.cta-btn:active{transform:scale(.97)}
.cta-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent 60%)}
.top-note{font-size:11px;color:rgba(148,163,184,0.5);text-align:center}

@keyframes fadeUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}

/* ── QUIZ SCREEN ── */
#screen-quiz{padding:0}
.quiz-shell{width:100%;max-width:540px;height:100dvh;display:flex;flex-direction:column;margin:0 auto;padding:16px 16px 24px}

/* Progress */
.prog-wrap{padding:8px 0 0}
.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-label{font-size:11px;color:var(--sub);letter-spacing:.06em}
.prog-num{font-size:13px;font-weight:700;color:var(--cyan)}
.prog-track{height:4px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .5s cubic-bezier(.16,1,.3,1)}

/* Axis chip */
.axis-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.3);border-radius:20px;padding:5px 14px;font-size:11px;color:#a5b4fc;margin:10px 0}
.axis-chip span{opacity:.6}

/* Card */
.q-card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 0}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:32px 28px 28px;backdrop-filter:blur(24px);box-shadow:0 8px 48px rgba(0,0,0,0.6),0 0 0 1px rgba(99,102,241,0.08);width:100%;animation:cardIn .45s cubic-bezier(.16,1,.3,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.q-icon{font-size:28px;margin-bottom:16px}
.q-text{font-size:16px;line-height:1.7;font-weight:500;color:var(--text)}

/* Choice buttons */
.choices{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.choice-btn{position:relative;border:none;border-radius:16px;padding:16px 20px;font-size:14px;line-height:1.5;font-weight:500;text-align:left;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;overflow:hidden}
.choice-btn.side-a{background:linear-gradient(135deg,rgba(37,99,235,0.25),rgba(99,102,241,0.18));border:1.5px solid rgba(99,102,241,0.4);color:#bfdbfe}
.choice-btn.side-b{background:linear-gradient(135deg,rgba(6,182,212,0.15),rgba(20,184,166,0.12));border:1.5px solid rgba(6,182,212,0.3);color:#a5f3fc}
.choice-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent)}
.choice-btn:hover{transform:translateY(-2px) scale(1.01)}
.choice-btn:hover.side-a{box-shadow:0 4px 24px rgba(99,102,241,0.3);border-color:rgba(99,102,241,0.7)}
.choice-btn:hover.side-b{box-shadow:0 4px 24px rgba(6,182,212,0.25);border-color:rgba(6,182,212,0.6)}
.choice-btn:active{transform:scale(.97)}
.choice-btn.picked{animation:pickFlash .3s ease both}
@keyframes pickFlash{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
.choice-label{display:block;font-size:10px;font-weight:700;letter-spacing:.12em;opacity:.55;margin-bottom:4px;text-transform:uppercase}

/* Swipe hint */
.quiz-hint{text-align:center;font-size:11px;color:rgba(148,163,184,0.4);padding-top:8px}

/* ── RESULT SCREEN ── */
#screen-result{padding:0;overflow-y:auto;display:block}
.result-scroll{max-width:560px;margin:0 auto;padding:40px 20px 80px}

.result-header{text-align:center;margin-bottom:32px;animation:fadeUp .6s .1s both}
.result-eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px}
.result-type-badge{display:inline-flex;align-items:center;gap:10px;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:.06em;margin-bottom:18px;border:1.5px solid}
.result-icon{font-size:52px;margin-bottom:8px;display:block}
.result-name{font-size:clamp(28px,7vw,42px);font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.result-tagline{font-size:14px;color:var(--sub);line-height:1.6;max-width:340px;margin:0 auto}

/* Axes bars */
.axes-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;animation:fadeUp .6s .2s both}
.axis-bar-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;backdrop-filter:blur(12px)}
.axis-bar-label{font-size:10px;color:var(--sub);letter-spacing:.08em;margin-bottom:8px;display:flex;justify-content:space-between}
.axis-bar-track{height:6px;background:rgba(255,255,255,0.07);border-radius:6px;overflow:hidden}
.axis-bar-fill{height:100%;border-radius:6px;transition:width 1s cubic-bezier(.16,1,.3,1)}

/* Sections */
.r-section{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px 20px;margin-bottom:16px;backdrop-filter:blur(12px)}
.r-section.anim1{animation:fadeUp .6s .25s both}
.r-section.anim2{animation:fadeUp .6s .35s both}
.r-section.anim3{animation:fadeUp .6s .45s both}
.r-section.anim4{animation:fadeUp .6s .55s both}
.r-section.anim5{animation:fadeUp .6s .65s both}
.r-section.anim6{animation:fadeUp .6s .75s both}
.r-section-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.r-section-title::before{content:'';display:block;width:3px;height:14px;border-radius:2px;background:var(--cyan);flex-shrink:0}
.r-body{font-size:14px;line-height:1.8;color:rgba(226,232,240,0.85)}
.kw-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.kw{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc}

/* Jobs */
.job-list{display:flex;flex-direction:column;gap:8px}
.job-item{display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(226,232,240,0.85)}
.job-item::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--cyan);flex-shrink:0}

/* Compat */
.compat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.compat-card{border-radius:14px;padding:12px;text-align:center;font-size:12px}
.compat-card.good{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3)}
.compat-card.bad{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2)}
.compat-card .ct-icon{font-size:22px;display:block;margin-bottom:4px}
.compat-card .ct-name{font-weight:700;color:var(--text);margin-bottom:2px}
.compat-card .ct-label{font-size:10px;color:var(--sub)}
.compat-reason{font-size:12px;color:var(--sub);margin-top:12px;line-height:1.6}

/* Retry button */
.retry-btn{display:block;width:100%;margin-top:24px;padding:16px;border-radius:16px;border:1.5px solid rgba(99,102,241,0.4);background:transparent;color:#a5b4fc;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s,border-color .2s}
.retry-btn:hover{background:rgba(99,102,241,0.12);border-color:rgba(99,102,241,0.7)}
.share-btn{display:block;width:100%;margin-top:10px;padding:16px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
.share-btn:hover{opacity:.85}

/* Axis axis chips colors */
.ax1{color:#60a5fa;border-color:rgba(96,165,250,0.4);background:rgba(96,165,250,0.08)}
.ax2{color:#f472b6;border-color:rgba(244,114,182,0.4);background:rgba(244,114,182,0.08)}
.ax3{color:#34d399;border-color:rgba(52,211,153,0.4);background:rgba(52,211,153,0.08)}
.ax4{color:#fbbf24;border-color:rgba(251,191,36,0.4);background:rgba(251,191,36,0.08)}

.axis-bar-fill.ax1{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.axis-bar-fill.ax2{background:linear-gradient(90deg,#ec4899,#f472b6)}
.axis-bar-fill.ax3{background:linear-gradient(90deg,#10b981,#34d399)}
.axis-bar-fill.ax4{background:linear-gradient(90deg,#d97706,#fbbf24)}
</style>
</head>
<body>
<canvas id="bgc"></canvas>

<!-- ══ SCREEN: TOP ══ -->
<div class="screen" id="screen-top">
  <div class="top-wrap">
    <span class="top-badge">Career Diagnostic · 20 Questions</span>
    <div class="top-logo">CareerType<br>診断</div>
    <p class="top-sub">20の質問であなたの就活タイプを分析。<br>16タイプの中から、あなたの本質を解析します。</p>
    <div class="top-cards">
      <div class="top-card"><span class="dot" style="background:#3b82f6"></span>対人 vs 対課題</div>
      <div class="top-card"><span class="dot" style="background:#ec4899"></span>攻め vs 支え</div>
      <div class="top-card"><span class="dot" style="background:#10b981"></span>WLB vs ワーク</div>
      <div class="top-card"><span class="dot" style="background:#f59e0b"></span>自走 vs 育成</div>
    </div>
    <button class="cta-btn" id="start-btn">診断スタート →</button>
    <p class="top-note">所要時間 約3〜5分 · 全20問</p>
  </div>
</div>

<!-- ══ SCREEN: QUIZ ══ -->
<div class="screen hidden" id="screen-quiz">
  <div class="quiz-shell">
    <div class="prog-wrap">
      <div class="prog-meta">
        <span class="prog-label">PROGRESS</span>
        <span class="prog-num" id="prog-num">1 / 20</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div style="display:flex;justify-content:center">
      <span class="axis-chip" id="axis-chip"><span>軸</span><strong id="axis-label">対人・対課題</strong></span>
    </div>
    <div class="q-card-area">
      <div class="q-card" id="q-card">
        <div class="q-icon" id="q-icon">💼</div>
        <div class="q-text" id="q-text">質問テキスト</div>
        <div class="choices">
          <button class="choice-btn side-a" id="btn-a">
            <span class="choice-label">A</span>
            <span id="choice-a-text">A側テキスト</span>
          </button>
          <button class="choice-btn side-b" id="btn-b">
            <span class="choice-label">B</span>
            <span id="choice-b-text">B側テキスト</span>
          </button>
        </div>
      </div>
    </div>
    <div class="quiz-hint">どちらか近い方を選んでください</div>
  </div>
</div>

<!-- ══ SCREEN: RESULT ══ -->
<div class="screen hidden" id="screen-result">
  <div class="result-scroll">
    <div class="result-header">
      <div class="result-eyebrow">あなたの就活タイプ</div>
      <div class="result-type-badge" id="r-badge">A1</div>
      <span class="result-icon" id="r-icon">⚡</span>
      <div class="result-name" id="r-name">自由なエース</div>
      <div class="result-tagline" id="r-tagline">自分のペースで、誰よりも速く結果を出す</div>
    </div>

    <!-- Axis bars -->
    <div class="axes-grid" id="axes-grid"></div>

    <!-- Keywords -->
    <div class="r-section anim1">
      <div class="r-section-title">キーワード</div>
      <div class="kw-list" id="r-keywords"></div>
    </div>

    <!-- Personality -->
    <div class="r-section anim2">
      <div class="r-section-title">あなたの本質</div>
      <div class="r-body" id="r-personality"></div>
    </div>

    <!-- Strengths + Stress -->
    <div class="r-section anim3">
      <div class="r-section-title">強み</div>
      <div class="r-body" id="r-strengths"></div>
      <div class="r-section-title" style="margin-top:16px">苦手な環境</div>
      <div class="r-body" id="r-stress"></div>
    </div>

    <!-- Comm -->
    <div class="r-section anim3">
      <div class="r-section-title">コミュニケーションスタイル</div>
      <div class="r-body" id="r-comm"></div>
    </div>

    <!-- Jobs -->
    <div class="r-section anim4">
      <div class="r-section-title">向いている職種</div>
      <div class="job-list" id="r-jobs"></div>
    </div>

    <!-- Compatibility -->
    <div class="r-section anim5">
      <div class="r-section-title">相性タイプ</div>
      <div class="compat-grid" id="r-compat"></div>
      <div class="compat-reason" id="r-good-reason"></div>
    </div>

    <!-- Growth -->
    <div class="r-section anim6">
      <div class="r-section-title">成長のヒント</div>
      <div class="r-body" id="r-growth"></div>
    </div>

    <button class="share-btn" id="share-btn">結果をシェアする</button>
    <button class="retry-btn" id="retry-btn">もう一度診断する</button>
  </div>
</div>

<script src="./data.js"></script>
<script>
// ── Background canvas ──
(function(){
  const c=document.getElementById('bgc');
  const ctx=c.getContext('2d');
  let W,H,pts=[];
  const orbs=[
    {x:.15,y:.25,r:200,col:'rgba(59,130,246,0.07)'},
    {x:.85,y:.65,r:250,col:'rgba(99,102,241,0.06)'},
    {x:.5,y:.05,r:180,col:'rgba(6,182,212,0.05)'},
    {x:.3,y:.85,r:160,col:'rgba(16,185,129,0.04)'}
  ];
  function rs(){W=c.width=innerWidth;H=c.height=innerHeight;}
  function ip(){pts=[];for(let i=0;i<60;i++)pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.2,a:Math.random()*Math.PI*2,sp:Math.random()*.003+.002,dr:(Math.random()-.5)*.1});}
  function dr(){
    ctx.clearRect(0,0,W,H);
    orbs.forEach(o=>{const g=ctx.createRadialGradient(o.x*W,o.y*H,0,o.x*W,o.y*H,o.r);g.addColorStop(0,o.col);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(o.x*W,o.y*H,o.r,0,Math.PI*2);ctx.fill();});
    pts.forEach(p=>{p.a+=p.sp;p.x+=p.dr;if(p.x>W)p.x=0;if(p.x<0)p.x=W;const al=(Math.sin(p.a)+1)/2*.5+.05;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(148,163,220,${al})`;ctx.fill();});
    requestAnimationFrame(dr);
  }
  rs();ip();dr();
  window.addEventListener('resize',()=>{rs();ip();});
})();

// ── App State ──
const AXIS_ICONS=['💼','🤝','⚔️','⏰','🚀'];
const AXIS_NAMES=['対人・対課題','対人・対課題','攻め・支え','WLB・ワーク重視','自走・育成'];
const AXIS_FULL={1:'対人 vs 対課題',2:'攻め vs 支え',3:'WLB vs ワーク重視',4:'自走 vs 育成'};
const AXIS_COLORS={1:'#60a5fa',2:'#f472b6',3:'#34d399',4:'#fbbf24'};
const AXIS_LEFT={1:'対人',2:'攻め',3:'WLB重視',4:'自走型'};
const AXIS_RIGHT={1:'対課題',2:'支え',3:'ワーク重視',4:'育成型'};

let cur=0;
const scores={1:0,2:0,3:0,4:0};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById('screen-'+id).classList.remove('hidden');
  if(id==='result')document.getElementById('screen-result').scrollTop=0;
}

// ── Quiz ──
const QICONS=['💼','🗣️','🧩','⚡','🔍','🎯','🚀','💡','🤝','🛡️','🌿','🌙','🏖️','🔥','✈️','📚','🧭','🗺️','🧠','🌱'];

function loadQ(){
  const q=QUESTIONS[cur];
  const card=document.getElementById('q-card');
  card.style.animation='none';
  requestAnimationFrame(()=>{card.style.animation='cardIn .45s cubic-bezier(.16,1,.3,1) both';});
  document.getElementById('q-icon').textContent=QICONS[cur];
  document.getElementById('q-text').textContent=`Q${cur+1}`;
  document.getElementById('choice-a-text').textContent=q.a;
  document.getElementById('choice-b-text').textContent=q.b;
  document.getElementById('prog-num').textContent=`${cur+1} / ${QUESTIONS.length}`;
  document.getElementById('prog-fill').style.width=`${(cur/QUESTIONS.length)*100}%`;
  const chip=document.getElementById('axis-chip');
  chip.className=`axis-chip ax${q.axis}`;
  document.getElementById('axis-label').textContent=AXIS_FULL[q.axis];
}

function pick(side){
  const btn=side==='a'?document.getElementById('btn-a'):document.getElementById('btn-b');
  btn.classList.add('picked');
  if(side==='a') scores[QUESTIONS[cur].axis]++;
  setTimeout(()=>{
    btn.classList.remove('picked');
    cur++;
    if(cur>=QUESTIONS.length){showResult();return;}
    loadQ();
  },280);
}

document.getElementById('btn-a').addEventListener('click',()=>pick('a'));
document.getElementById('btn-b').addEventListener('click',()=>pick('b'));
document.getElementById('start-btn').addEventListener('click',()=>{
  cur=0;scores[1]=0;scores[2]=0;scores[3]=0;scores[4]=0;
  showScreen('quiz');
  loadQ();
});
document.getElementById('retry-btn').addEventListener('click',()=>showScreen('top'));

// ── Scoring ──
function calcType(){
  // Each axis: 5 questions, A=1 point. ≥3 = left side
  const a1=scores[1],a2=scores[2],a3=scores[3],a4=scores[4];
  const letter=(a1>=3?'A':'C'+(a2>=3?'':'_'))
    .replace('_','');
  // letter logic
  let L,N;
  if(a1>=3&&a2>=3)L='A';
  else if(a1>=3&&a2<3)L='B';
  else if(a1<3&&a2>=3)L='C';
  else L='D';
  if(a3>=3&&a4>=3)N=1;
  else if(a3>=3&&a4<3)N=2;
  else if(a3<3&&a4>=3)N=3;
  else N=4;
  return{key:L+N,scores:{1:a1,2:a2,3:a3,4:a4}};
}

function showResult(){
  const{key,scores:sc}=calcType();
  const t=TYPES[key]||TYPES['A1'];

  // Header
  const badge=document.getElementById('r-badge');
  badge.textContent=key+' · '+t.name;
  badge.style.background=t.color+'18';
  badge.style.borderColor=t.color+'55';
  badge.style.color=t.color;
  document.getElementById('r-icon').textContent=t.icon;
  document.getElementById('r-name').textContent=t.name;
  document.getElementById('r-tagline').textContent=t.tagline;

  // Axis bars
  const axGrid=document.getElementById('axes-grid');
  axGrid.innerHTML='';
  [[1,'ax1'],[2,'ax2'],[3,'ax3'],[4,'ax4']].forEach(([ax,cls])=>{
    const pct=Math.round(sc[ax]/5*100);
    const lbl=AXIS_LEFT[ax];
    const rbl=AXIS_RIGHT[ax];
    axGrid.innerHTML+=`<div class="axis-bar-card">
      <div class="axis-bar-label"><span>${lbl}</span><span>${rbl}</span></div>
      <div class="axis-bar-track"><div class="axis-bar-fill ${cls}" style="width:0%" data-w="${pct}%"></div></div>
      <div style="font-size:10px;color:var(--sub);margin-top:6px">${lbl}: ${sc[ax]}/5</div>
    </div>`;
  });
  // animate bars
  setTimeout(()=>{
    axGrid.querySelectorAll('.axis-bar-fill').forEach(el=>{el.style.width=el.dataset.w;});
  },200);

  // Keywords
  const kwEl=document.getElementById('r-keywords');
  kwEl.innerHTML=t.keywords.map(k=>`<span class="kw">${k}</span>`).join('');

  // Text sections
  document.getElementById('r-personality').textContent=t.personality;
  document.getElementById('r-strengths').textContent=t.strengths;
  document.getElementById('r-stress').textContent=t.stress;
  document.getElementById('r-comm').textContent=t.comm;
  document.getElementById('r-growth').textContent=t.growth;

  // Jobs
  const jobEl=document.getElementById('r-jobs');
  jobEl.innerHTML=t.jobs.map(j=>`<div class="job-item">${j}</div>`).join('');

  // Compatibility
  const compEl=document.getElementById('r-compat');
  const goodTypes=t.good||[];
  const badTypes=t.bad||[];
  compEl.innerHTML='';
  goodTypes.slice(0,2).forEach(tk=>{
    const tt=TYPES[tk];
    if(!tt)return;
    compEl.innerHTML+=`<div class="compat-card good"><span class="ct-icon">${tt.icon}</span><div class="ct-name">${tt.name}</div><div class="ct-label">${tk} · 相性◎</div></div>`;
  });
  badTypes.slice(0,2).forEach(tk=>{
    const tt=TYPES[tk];
    if(!tt)return;
    compEl.innerHTML+=`<div class="compat-card bad"><span class="ct-icon">${tt.icon}</span><div class="ct-name">${tt.name}</div><div class="ct-label">${tk} · 要注意</div></div>`;
  });
  document.getElementById('r-good-reason').textContent=t.goodReason||'';

  showScreen('result');
}

// ── Share ──
document.getElementById('share-btn').addEventListener('click',()=>{
  const{key}=calcType();
  const t=TYPES[key];
  const txt=`【就活タイプ診断】\n私のタイプは「${t.name}」(${key})でした！\n${t.tagline}\n\n#就活タイプ診断 #CareerType`;
  if(navigator.share){navigator.share({text:txt});}
  else{navigator.clipboard.writeText(txt).then(()=>alert('クリップボードにコピーしました！'));}
});
</script>
