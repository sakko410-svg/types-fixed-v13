<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>診断｜ナイトタイプ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./style.css"/>
  <style>
    body { overflow: hidden; font-family: 'Noto Sans JP', sans-serif; }

    /* ── 背景 ── */
    .quiz-bg {
      position: fixed; inset: 0; z-index: 0;
      background: #0d0a14;
      overflow: hidden;
    }
    .quiz-bg::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% 10%, rgba(255,45,120,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 85%, rgba(124,58,237,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255,100,160,0.06) 0%, transparent 70%);
    }
    .quiz-bg-orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.45;
      animation: orbFloat 10s ease-in-out infinite;
    }
    .quiz-bg-orb:nth-child(1) { width: 420px; height: 420px; background: radial-gradient(circle, #9d174d, transparent); top: -120px; left: -80px; animation-delay: 0s; }
    .quiz-bg-orb:nth-child(2) { width: 320px; height: 320px; background: radial-gradient(circle, #7c3aed, transparent); bottom: 40px; right: -60px; animation-delay: -4s; }
    .quiz-bg-orb:nth-child(3) { width: 200px; height: 200px; background: radial-gradient(circle, #ff2d78, transparent); top: 45%; left: 55%; animation-delay: -7s; opacity: 0.25; }
    @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1);} 40%{transform:translate(20px,-24px) scale(1.05);} 70%{transform:translate(-18px,16px) scale(0.96);} }

    /* ── メインレイアウト ── */
    .quiz-page { position: fixed; inset: 0; z-index: 1; display: flex; flex-direction: column; }

    /* ── トップバー ── */
    .quiz-topbar { padding: 52px 22px 0; flex-shrink: 0; }
    .topbar-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .topbar-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.05rem;
      background: linear-gradient(90deg, #f472b6, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none; letter-spacing: 0.05em;
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    /* ── マッチ率バー ── */
    .match-meter-wrap { margin-bottom: 6px; }
    .match-meter-label {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 7px;
    }
    .match-meter-title {
      font-family: 'Syne', sans-serif; font-size: 0.6rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.3);
      display: flex; align-items: center; gap: 6px;
    }
    .match-meter-title .heart-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: linear-gradient(135deg, #f472b6, #c084fc);
      box-shadow: 0 0 8px rgba(244,114,182,0.8);
      animation: heartPulse 1.6s ease-in-out infinite;
    }
    @keyframes heartPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.5);} }
    .match-meter-count {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
    }
    .match-meter-count span { color: #f9a8d4; font-size: 0.95rem; }
    .match-bar-track {
      width: 100%; height: 5px; border-radius: 999px;
      background: rgba(255,255,255,0.07); overflow: visible; position: relative;
    }
    .match-bar-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #db2777, #f472b6, #c084fc);
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      box-shadow: 0 0 10px rgba(244,114,182,0.5);
    }
    .match-bar-fill::after {
      content: '❤';
      position: absolute; right: -8px; top: 50%; transform: translateY(-50%);
      font-size: 13px; line-height: 1;
      filter: drop-shadow(0 0 6px rgba(244,114,182,0.9));
    }

    /* ── カードスタック ── */
    .card-stack {
      flex: 1; position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 10px 18px 2px;
    }

    /* 背面カード */
    .q-card-back {
      position: absolute;
      width: calc(100% - 60px); max-width: 390px;
      border-radius: 28px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 24px;
      transform: scale(0.93) translateY(16px);
      opacity: 0.4;
      pointer-events: none;
      transition: transform 0.38s, opacity 0.38s;
    }
    .q-card-back.peek { transform: scale(0.96) translateY(10px); opacity: 0.55; }
    .back-line { height: 10px; border-radius: 5px; background: rgba(255,255,255,0.05); margin-bottom: 10px; }
    .back-line:last-child { width: 60%; }

    /* メインカード */
    .q-card-main {
      position: relative; z-index: 5;
      width: calc(100% - 28px); max-width: 430px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03) inset;
      cursor: grab; user-select: none; touch-action: pan-y;
      will-change: transform;
    }
    .q-card-main:active { cursor: grabbing; }

    /* カード上部グラデーション帯 */
    .card-header-band {
      width: 100%; height: 4px;
      background: linear-gradient(90deg, #db2777, #f472b6, #c084fc, #818cf8);
      background-size: 200% 100%;
      animation: gradShift 4s linear infinite;
    }
    @keyframes gradShift { 0%{background-position:0% 50%;} 100%{background-position:200% 50%;} }

    /* カード内部 */
    .card-inner { padding: 22px 24px 24px; }
    .card-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .card-tag {
      font-family: 'Syne', sans-serif; font-size: 0.58rem;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: #f9a8d4;
      display: flex; align-items: center; gap: 6px;
    }
    .card-tag-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: linear-gradient(135deg, #db2777, #c084fc);
      box-shadow: 0 0 8px rgba(219,39,119,0.9);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.5);opacity:0.6;} }
    .card-num {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.68rem; color: rgba(255,255,255,0.18);
    }

    /* プロフィールカード風プロンプト */
    .card-prompt-label {
      font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(244,114,182,0.55); margin-bottom: 10px;
      font-family: 'Syne', sans-serif;
    }
    .card-question {
      font-size: 1.12rem; font-weight: 500;
      line-height: 1.9; color: rgba(255,255,255,0.92);
      min-height: 76px; margin: 0 0 18px;
      letter-spacing: 0.02em;
    }

    /* カードフッター */
    .card-footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-footer-hint {
      font-size: 0.58rem; color: rgba(255,255,255,0.2);
      font-family: 'Syne', sans-serif; letter-spacing: 0.08em;
    }
    .card-footer-swipe {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.56rem; color: rgba(255,255,255,0.18);
      font-family: 'Syne', sans-serif;
    }
    .swipe-icon { font-size: 0.8rem; opacity: 0.5; }

    /* ── スワイプラベル ── */
    .swipe-label {
      position: absolute; padding: 9px 18px; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
      letter-spacing: 0.12em; opacity: 0; pointer-events: none; z-index: 20;
      transition: opacity 0.06s;
    }
    .swipe-label.yes {
      top: 22px; right: 16px; transform: rotate(14deg);
      background: rgba(219,39,119,0.15);
      border: 2.5px solid #f472b6; color: #fda4af;
      box-shadow: 0 0 24px rgba(244,114,182,0.3);
    }
    .swipe-label.no {
      top: 22px; left: 16px; transform: rotate(-14deg);
      background: rgba(100,100,120,0.15);
      border: 2.5px solid rgba(148,163,184,0.6); color: rgba(203,213,225,0.9);
      box-shadow: 0 0 20px rgba(148,163,184,0.15);
    }

    /* ── アクションエリア ── */
    .action-area { flex-shrink: 0; padding: 8px 20px 22px; }

    /* メイン5択ボタン */
    .five-btns {
      display: flex; gap: 10px;
      align-items: flex-end;
      justify-content: center;
      margin-bottom: 10px;
    }

    /* 共通ボタン */
    .btn-5 {
      border: none; cursor: pointer; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, opacity 0.15s;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .btn-5:active { transform: scale(0.82) !important; }
    .btn-5-emoji { line-height: 1; }

    /* NOPE（強く違う）- 一番大きい左 */
    .btn-5-5 {
      width: 68px; height: 68px;
      background: rgba(30,30,40,0.7);
      border: 2px solid rgba(148,163,184,0.35);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .btn-5-5:hover { transform: scale(1.1); border-color: rgba(148,163,184,0.7); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
    .btn-5-5 .btn-5-emoji { font-size: 1.8rem; }

    /* そう思わない - 中くらい左 */
    .btn-5-4 {
      width: 52px; height: 52px;
      background: rgba(30,30,40,0.5);
      border: 1.5px solid rgba(148,163,184,0.2);
    }
    .btn-5-4:hover { transform: scale(1.08); border-color: rgba(148,163,184,0.45); }
    .btn-5-4 .btn-5-emoji { font-size: 1.3rem; }

    /* どちらでもない - 小さい中央 */
    .btn-5-3 {
      width: 44px; height: 44px;
      background: rgba(40,35,55,0.6);
      border: 1.5px solid rgba(255,255,255,0.1);
    }
    .btn-5-3:hover { transform: scale(1.08); background: rgba(60,50,80,0.6); }
    .btn-5-3 .btn-5-emoji { font-size: 1.1rem; }

    /* そう思う - 中くらい右 */
    .btn-5-2 {
      width: 52px; height: 52px;
      background: rgba(219,39,119,0.15);
      border: 1.5px solid rgba(244,114,182,0.35);
    }
    .btn-5-2:hover { transform: scale(1.08); border-color: rgba(244,114,182,0.6); box-shadow: 0 4px 20px rgba(219,39,119,0.2); }
    .btn-5-2 .btn-5-emoji { font-size: 1.3rem; }

    /* LIKE（強くそう思う）- 一番大きい右 */
    .btn-5-1 {
      width: 68px; height: 68px;
      background: linear-gradient(135deg, rgba(219,39,119,0.35), rgba(192,132,252,0.35));
      border: 2px solid rgba(244,114,182,0.6);
      box-shadow: 0 4px 24px rgba(219,39,119,0.3);
    }
    .btn-5-1:hover { transform: scale(1.1); box-shadow: 0 10px 36px rgba(219,39,119,0.5); border-color: rgba(244,114,182,0.9); }
    .btn-5-1 .btn-5-emoji { font-size: 1.85rem; }

    /* スケールヒント */
    .scale-hint {
      display: flex; justify-content: space-between; padding: 0 8px;
      margin-bottom: 10px;
    }
    .scale-hint span {
      font-size: 0.52rem; color: rgba(255,255,255,0.18);
      font-family: 'Syne', sans-serif;
    }

    /* 戻るボタン */
    .sub-btns { display: flex; justify-content: center; }
    .btn-back {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 9px 22px;
      color: rgba(255,255,255,0.25); cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 0.6rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-back:hover:not(:disabled) { border-color: rgba(244,114,182,0.4); color: #fda4af; background: rgba(219,39,119,0.08); }
    .btn-back:disabled { opacity: 0.15; pointer-events: none; }

    /* ── マッチ発見オーバーレイ ── */
    .analyzing-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: #0d0a14;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s;
    }
    .analyzing-overlay.show { opacity: 1; pointer-events: all; }
    .match-found-icon {
      font-size: 4rem; line-height: 1;
      animation: matchBounce 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes matchBounce { 0%{transform:scale(0) rotate(-30deg);opacity:0;} 100%{transform:scale(1) rotate(0deg);opacity:1;} }
    .analyzing-title {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem;
      background: linear-gradient(135deg, #fda4af, #f472b6, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-align: center; letter-spacing: -0.01em;
    }
    .analyzing-sub {
      font-size: 0.72rem; color: rgba(255,255,255,0.3);
      letter-spacing: 0.18em; text-align: center;
    }
    .analyzing-bar-wrap {
      width: 220px; height: 4px;
      background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden;
    }
    .analyzing-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #db2777, #f472b6, #c084fc);
      border-radius: 999px; transition: width 0.15s;
    }
    .analyzing-chars { display: flex; gap: 12px; margin-bottom: 4px; }
    .analyzing-chars img {
      width: 50px; height: 50px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(244,114,182,0.3);
      opacity: 0; transform: scale(0.5) translateY(10px);
      transition: all 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    .analyzing-chars img.show { opacity: 1; transform: scale(1) translateY(0); }

    /* ── 確認ダイアログ ── */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(20px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .confirm-overlay.show { opacity: 1; pointer-events: all; }
    .confirm-sheet {
      width: 100%; max-width: 480px;
      background: rgba(18,14,28,0.98);
      border-radius: 28px 28px 0 0;
      border: 1px solid rgba(244,114,182,0.15); border-bottom: none;
      padding: 32px 24px 50px;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    }
    .confirm-overlay.show .confirm-sheet { transform: translateY(0); }
    .confirm-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.1); margin: 0 auto 24px;
    }
    .confirm-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.2rem; margin-bottom: 8px;
      text-align: center; color: #fff;
    }
    .confirm-desc {
      font-size: 0.8rem; color: rgba(255,255,255,0.35);
      line-height: 1.7; text-align: center; margin-bottom: 24px;
    }
    .confirm-yes {
      width: 100%; padding: 16px; border-radius: 16px; border: none;
      background: linear-gradient(135deg, #db2777, #c084fc);
      color: #fff; font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.85rem; cursor: pointer; margin-bottom: 10px;
      transition: all 0.2s; box-shadow: 0 6px 20px rgba(219,39,119,0.35);
    }
    .confirm-yes:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(219,39,119,0.5); }
    .confirm-no {
      width: 100%; padding: 16px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: rgba(255,255,255,0.35);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer;
    }

    .particle-canvas { position: fixed; inset: 0; z-index: 200; pointer-events: none; }
  </style>
</head>
<body>

<div class="quiz-bg">
  <div class="quiz-bg-orb"></div>
  <div class="quiz-bg-orb"></div>
  <div class="quiz-bg-orb"></div>
</div>

<canvas class="particle-canvas" id="particleCanvas"></canvas>

<!-- マッチ発見オーバーレイ -->
<div class="analyzing-overlay" id="analyzingOverlay">
  <div class="match-found-icon">💘</div>
  <div class="analyzing-chars" id="analyzingChars"></div>
  <div class="analyzing-title">タイプを探しています…</div>
  <div class="analyzing-sub">あなたの夜の価値観を分析中</div>
  <div class="analyzing-bar-wrap"><div class="analyzing-bar" id="analyzingBar"></div></div>
</div>

<!-- 確認ダイアログ -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-sheet">
    <div class="confirm-handle"></div>
    <div class="confirm-title">最初からやり直す？</div>
    <div class="confirm-desc">これまでの回答がリセットされます。</div>
    <button class="confirm-yes" id="confirmYes">やり直す</button>
    <button class="confirm-no" id="confirmNo">続ける</button>
  </div>
</div>

<!-- ドロワー -->
<div class="drawer" id="drawer">
  <a href="index.html"><span class="icon">🏠</span>ホーム</a>
  <a href="quiz.html" class="active"><span class="icon">🌙</span>診断する</a>
  <a href="characters.html"><span class="icon">🎴</span>キャラ一覧</a>
  <a href="compat.html"><span class="icon">💜</span>相性チェック</a>
  <a href="matrix.html"><span class="icon">📊</span>相性マトリクス</a>
</div>
<div class="drawer-overlay" id="drawer-overlay"></div>

<!-- メイン -->
<div class="quiz-page">
  <div class="quiz-topbar">
    <div class="topbar-row">
      <a href="index.html" class="topbar-logo" id="topbarLogo">NightType</a>
      <div class="topbar-right">
        <button class="hamburger" id="hamburger" style="position:static"><span></span><span></span><span></span></button>
      </div>
    </div>

    <!-- マッチ率バー -->
    <div class="match-meter-wrap">
      <div class="match-meter-label">
        <div class="match-meter-title">
          <div class="heart-dot"></div>
          MATCH METER
        </div>
        <div class="match-meter-count"><span id="currentQ">1</span> / 24</div>
      </div>
      <div class="match-bar-track">
        <div class="match-bar-fill" id="matchBarFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- カードスタック -->
  <div class="card-stack">
    <div class="q-card-back" id="qCardBack">
      <div class="back-line"></div>
      <div class="back-line"></div>
    </div>
    <div class="q-card-main" id="qCard">
      <div class="card-header-band"></div>
      <div class="card-inner">
        <div class="swipe-label yes" id="labelYes">LIKE ❤️</div>
        <div class="swipe-label no"  id="labelNo">NOPE ✕</div>
        <div class="card-meta">
          <div class="card-tag"><div class="card-tag-dot"></div><span>Night Prompt</span></div>
          <div class="card-num" id="qNum">01 / 24</div>
        </div>
        <div class="card-prompt-label">Q. あなたはどう思う？</div>
        <p class="card-question" id="question">読み込み中...</p>
        <div class="card-footer">
          <div class="card-footer-hint">スワイプで回答</div>
          <div class="card-footer-swipe">
            <span class="swipe-icon">←</span>違う
            &nbsp;&nbsp;
            そう思う<span class="swipe-icon">→</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- アクションエリア -->
  <div class="action-area">
    <!-- 5択ボタン（左から: 強く違う・違う・どちらでも・そう思う・強くそう思う） -->
    <div class="five-btns">
      <button class="btn-5 btn-5-5" data-val="-2">
        <div class="btn-5-emoji">✕</div>
      </button>
      <button class="btn-5 btn-5-4" data-val="-1">
        <div class="btn-5-emoji">😔</div>
      </button>
      <button class="btn-5 btn-5-3" data-val="0">
        <div class="btn-5-emoji">🌫</div>
      </button>
      <button class="btn-5 btn-5-2" data-val="1">
        <div class="btn-5-emoji">🌙</div>
      </button>
      <button class="btn-5 btn-5-1" data-val="2">
        <div class="btn-5-emoji">❤️</div>
      </button>
    </div>

    <div class="scale-hint">
      <span>← 全く違う</span>
      <span>強くそう思う →</span>
    </div>

    <div class="sub-btns">
      <button class="btn-back" id="backBtn" disabled>
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        前の質問に戻る
      </button>
    </div>
  </div>
</div>

<script src="./questions.js"></script>
<script src="./types.js"></script>
<script>
let idx = 0;
const scores = {}, history = [];

const card     = document.getElementById('qCard');
const cardBack = document.getElementById('qCardBack');
const qEl      = document.getElementById('question');
const qNum     = document.getElementById('qNum');
const currentQ = document.getElementById('currentQ');
const overlay  = document.getElementById('analyzingOverlay');
const bar      = document.getElementById('analyzingBar');
const backBtn  = document.getElementById('backBtn');
const labelYes = document.getElementById('labelYes');
const labelNo  = document.getElementById('labelNo');
const pCanvas  = document.getElementById('particleCanvas');
const pCtx     = pCanvas.getContext('2d');
const matchBar = document.getElementById('matchBarFill');

function resizePC(){ pCanvas.width=window.innerWidth; pCanvas.height=window.innerHeight; }
resizePC(); window.addEventListener('resize',resizePC);

// 分析キャラ
Object.keys(types).slice(0,5).forEach(k=>{
  const t=types[k]; if(!t.image)return;
  const img=document.createElement('img'); img.src=t.image;
  document.getElementById('analyzingChars').appendChild(img);
});

if(new URLSearchParams(location.search).get('restart')==='1'){
  localStorage.removeItem('nightTypeScores');
}

function pad(n){ return n<10?'0'+n:''+n; }

function show(){
  qEl.textContent=questions[idx].text;
  qNum.textContent=pad(idx+1)+' / '+questions.length;
  currentQ.textContent=idx+1;
  backBtn.disabled=idx===0;
  cardBack.classList.toggle('peek', idx+1 < questions.length);
  // マッチ率バー更新
  const pct = (idx / questions.length) * 100;
  matchBar.style.width = pct + '%';
}

// ── 効果音 ──
let audioCtx=null;
function getAudio(){ if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playSound(val){
  try{
    const ctx=getAudio();
    const osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type='sine';
    const freqMap={2:[540,820],1:[470,660],0:[380,380],'-1':[340,240],'-2':[300,170]};
    const [f0,f1]=freqMap[val]||[380,380];
    osc.frequency.setValueAtTime(f0,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(Math.max(f1,10),ctx.currentTime+0.12);
    gain.gain.setValueAtTime(0.12,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
    osc.start(); osc.stop(ctx.currentTime+0.3);
  }catch(e){}
}

// ── パーティクル ──
let particles=[];
function spawnParticles(val,x,y){
  const positive=val>0;
  const colors=positive
    ?['#f472b6','#fda4af','#c084fc','#e879f9','#fb7185']
    :val===0
    ?['#94a3b8','#cbd5e1','#e2e8f0']
    :['#94a3b8','#64748b','#cbd5e1'];
  const count=positive?[0,20,28][Math.abs(val)]||20:val===0?8:14;
  for(let i=0;i<count;i++){
    const angle=(Math.PI*2/count)*i+Math.random()*0.7;
    const speed=2+Math.random()*5*Math.max(Math.abs(val)/2,0.3);
    particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-(positive?3:0.5),
      color:colors[i%colors.length],size:positive?4+Math.random()*7:3+Math.random()*4,
      life:1,decay:0.024+Math.random()*0.02,gravity:0.22,
      heart:val===2&&Math.random()<0.45});
  }
}
function animateP(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.97;p.life-=p.decay;
    pCtx.globalAlpha=Math.max(0,p.life);
    if(p.heart){pCtx.font=`${Math.max(4,p.size*2*p.life)}px sans-serif`;pCtx.fillText('❤',p.x,p.y);}
    else{pCtx.fillStyle=p.color;pCtx.beginPath();pCtx.arc(p.x,p.y,Math.max(0.1,p.size*p.life),0,Math.PI*2);pCtx.fill();}
    pCtx.globalAlpha=1;
  });
  if(particles.length>0)requestAnimationFrame(animateP);
  else pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
}

// ── カード飛ばし ──
function flyCard(isPositive,cb){
  const tx=isPositive?window.innerWidth*1.4:-window.innerWidth*1.4;
  const rot=isPositive?26:-26;
  card.style.transition='transform 0.36s cubic-bezier(0.5,0,1,0.5),opacity 0.3s';
  card.style.transform=`translateX(${tx}px) rotate(${rot}deg)`;
  card.style.opacity='0';
  cardBack.style.transition='transform 0.3s cubic-bezier(0.34,1.2,0.64,1),opacity 0.3s';
  cardBack.style.transform='scale(1) translateY(0)';
  cardBack.style.opacity='0.65';
  setTimeout(()=>{
    card.style.transition='';card.style.transform='';card.style.opacity='';
    cardBack.style.transition='';cardBack.style.transform='';cardBack.style.opacity='';
    cb();
  },340);
}

// ── 回答（5択：-2〜+2） ──
function answer(val){
  history.push({type:questions[idx].type,val});
  scores[questions[idx].type]=(scores[questions[idx].type]||0)+val;
  playSound(val);
  const rect=card.getBoundingClientRect();
  spawnParticles(val,rect.left+rect.width/2,rect.top+rect.height/2);
  requestAnimationFrame(animateP);
  idx++;
  if(idx<questions.length){
    flyCard(val>=0,show);
  }else{
    flyCard(val>=0,()=>{
      localStorage.setItem('nightTypeScores',JSON.stringify(scores));
      overlay.classList.add('show');
      document.getElementById('analyzingChars').querySelectorAll('img').forEach((im,i)=>setTimeout(()=>im.classList.add('show'),i*200));
      let p=0;
      const iv=setInterval(()=>{p=Math.min(p+2,100);bar.style.width=p+'%';if(p>=100){clearInterval(iv);setTimeout(()=>window.location.href='result.html',450);}},30);
    });
  }
}

// 5択ボタン
document.querySelectorAll('.btn-5').forEach(btn=>{
  btn.addEventListener('click',()=>answer(parseInt(btn.dataset.val)));
});

// 戻る
backBtn.addEventListener('click',()=>{
  if(!history.length)return;
  const last=history.pop(); idx--;
  scores[last.type]=(scores[last.type]||0)-last.val;
  card.style.transition='transform 0.38s cubic-bezier(0.34,1.3,0.64,1),opacity 0.25s';
  card.style.transform='scale(0.94) translateY(8px)';
  card.style.opacity='0.5';
  setTimeout(()=>{card.style.transition='';card.style.transform='';card.style.opacity='';show();},220);
});

// ── スワイプ ──
let startX=0,startY=0,dragging=false,curX=0;
const T1=60, T2=110;

function dragStart(x,y){startX=x;startY=y;dragging=true;curX=0;}
function dragMove(x,y){
  if(!dragging)return;
  const dx=x-startX,dy=y-startY;
  if(Math.abs(dy)>Math.abs(dx)*1.5){dragging=false;resetCard();return;}
  curX=dx;
  const r=Math.min(Math.abs(dx)/T2,1);
  card.style.transform=`translateX(${dx*0.52}px) rotate(${dx*0.036}deg)`;
  if(dx>12){
    labelYes.style.opacity=Math.min(r*1.3,1);labelNo.style.opacity=0;
    card.style.boxShadow=`0 0 0 2px rgba(244,114,182,${0.5*r}),0 20px 60px rgba(0,0,0,0.55),0 0 40px rgba(219,39,119,${0.2*r})`;
  }else if(dx<-12){
    labelNo.style.opacity=Math.min(r*1.3,1);labelYes.style.opacity=0;
    card.style.boxShadow=`0 0 0 2px rgba(148,163,184,${0.4*r}),0 20px 60px rgba(0,0,0,0.55)`;
  }else{labelYes.style.opacity=0;labelNo.style.opacity=0;card.style.boxShadow='';}
}
function resetCard(){
  labelYes.style.opacity=0;labelNo.style.opacity=0;card.style.boxShadow='';
  card.style.transition='transform 0.45s cubic-bezier(0.34,1.56,0.64,1)';
  card.style.transform='';
  setTimeout(()=>card.style.transition='',450);
}
function dragEnd(){
  if(!dragging)return;dragging=false;
  if(curX>T2)       answer(2);
  else if(curX>T1)  answer(1);
  else if(curX<-T2) answer(-2);
  else if(curX<-T1) answer(-1);
  else resetCard();
}

card.addEventListener('touchstart',e=>dragStart(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
card.addEventListener('touchmove', e=>dragMove(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
card.addEventListener('touchend',  dragEnd);
card.addEventListener('mousedown', e=>{dragStart(e.clientX,e.clientY);card.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>dragMove(e.clientX,e.clientY));
window.addEventListener('mouseup',()=>{card.style.cursor='';dragEnd();});

// 確認ダイアログ
const confirmOverlay=document.getElementById('confirmOverlay');
document.getElementById('topbarLogo').addEventListener('click',e=>{if(idx>0){e.preventDefault();confirmOverlay.classList.add('show');}});
document.getElementById('confirmYes').addEventListener('click',()=>window.location.href='quiz.html?restart=1');
document.getElementById('confirmNo').addEventListener('click',()=>confirmOverlay.classList.remove('show'));

show();
</script>
<script src="./common.js"></script>
</body>
</html>
