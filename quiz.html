<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>診断｜ナイトタイプ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./style.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { overflow: hidden; font-family: 'Noto Sans JP', sans-serif; background: #0b0812; }

    /* ══════════════════════════════
       BG
    ══════════════════════════════ */
    .qbg {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
      background: radial-gradient(ellipse 90% 70% at 10% 5%,  #1a0624 0%, transparent 55%),
                  radial-gradient(ellipse 80% 60% at 90% 90%, #0d0520 0%, transparent 55%),
                  #0b0812;
    }
    .qbg-orb {
      position: absolute; border-radius: 50%; filter: blur(100px);
      animation: orbf 16s ease-in-out infinite;
    }
    .qbg-orb:nth-child(1){ width:520px;height:520px;top:-180px;left:-140px;
      background:radial-gradient(circle,rgba(180,20,80,0.3),transparent 60%);animation-delay:0s; }
    .qbg-orb:nth-child(2){ width:400px;height:400px;bottom:-100px;right:-110px;
      background:radial-gradient(circle,rgba(90,20,180,0.25),transparent 60%);animation-delay:-6s; }
    .qbg-orb:nth-child(3){ width:280px;height:280px;top:38%;left:42%;
      background:radial-gradient(circle,rgba(200,50,120,0.12),transparent 60%);animation-delay:-11s; }
    @keyframes orbf{
      0%,100%{ transform:translate(0,0) scale(1); }
      40%{ transform:translate(30px,-28px) scale(1.07); }
      70%{ transform:translate(-20px,22px) scale(0.93); }
    }

    /* ══════════════════════════════
       LAYOUT
    ══════════════════════════════ */
    .qpage {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
    }

    /* ══════════════════════════════
       TOP BAR
    ══════════════════════════════ */
    .qtop {
      flex-shrink: 0;
      padding: 52px 20px 0;
    }
    .qtop-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .qtop-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
      letter-spacing: 0.07em; text-decoration: none;
      background: linear-gradient(100deg, #fb7185 0%, #e879f9 55%, #818cf8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ── MATCH METER ── */
    .meter-box {
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 13px 16px 14px;
    }
    .meter-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .meter-lhs {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Syne', sans-serif; font-size: 0.57rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }
    .meter-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: linear-gradient(135deg, #fb7185, #e879f9);
      box-shadow: 0 0 10px rgba(251,113,133,0.9);
      animation: mbeat 1.5s ease-in-out infinite;
    }
    @keyframes mbeat{ 0%,100%{transform:scale(1);}45%{transform:scale(1.65);} }
    .meter-count {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.7rem; color: rgba(255,255,255,0.35);
    }
    .meter-count strong { color: #fda4af; font-size: 0.92rem; font-weight: 800; }

    .meter-track {
      position: relative; height: 5px; border-radius: 999px;
      background: rgba(255,255,255,0.06);
    }
    .meter-fill {
      position: absolute; top:0; left:0; height:100%; border-radius:999px;
      background: linear-gradient(90deg, #be185d 0%, #f472b6 45%, #c084fc 80%, #818cf8 100%);
      background-size: 200% 100%;
      animation: gradslide 3.5s linear infinite;
      transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 14px rgba(244,114,182,0.55);
    }
    @keyframes gradslide{ 0%{background-position:0%} 100%{background-position:200%} }
    .meter-fill::after {
      content: '❤'; position:absolute; right:-11px; top:50%;
      transform:translateY(-50%); font-size:14px; line-height:1;
      filter:drop-shadow(0 0 8px rgba(244,114,182,1));
      animation: mbeat 1.5s ease-in-out infinite;
    }

    /* ══════════════════════════════
       CARD STACK
    ══════════════════════════════ */
    .card-stack {
      flex: 1; position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 10px 16px 0;
      min-height: 0;
    }

    /* 背面 */
    .cback {
      position: absolute;
      width: calc(100% - 52px); max-width: 400px;
      border-radius: 28px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 24px; height: 120px;
      transform: scale(0.93) translateY(18px); opacity: 0.3;
      pointer-events: none;
      transition: transform 0.42s cubic-bezier(0.4,0,0.2,1), opacity 0.42s;
    }
    .cback.peek { transform: scale(0.96) translateY(10px); opacity: 0.5; }
    .cbl { height:9px;border-radius:5px;background:rgba(255,255,255,0.04);margin-bottom:9px; }
    .cbl:last-child{ width:55%; }

    /* メインカード */
    .cmain {
      position: relative; z-index: 5;
      width: calc(100% - 22px); max-width: 440px;
      border-radius: 28px; overflow: hidden;
      cursor: grab; user-select: none; touch-action: pan-y;
      will-change: transform;
      /* 多層シャドウ */
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 2px 1px  rgba(255,255,255,0.04) inset,
        0 24px 70px rgba(0,0,0,0.75),
        0 6px 20px  rgba(180,20,90,0.08);
    }
    .cmain:active { cursor: grabbing; }

    /* カード背景レイヤ */
    .cmain-bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        linear-gradient(155deg, rgba(180,20,80,0.09) 0%, transparent 50%),
        rgba(255,255,255,0.048);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
    }

    /* カラーライン */
    .cmain-line {
      position: relative; z-index: 2; height: 3px;
      background: linear-gradient(90deg, #9d174d, #f472b6, #e879f9, #818cf8, #f472b6);
      background-size: 300% 100%; animation: gradslide 4s linear infinite;
    }

    /* カード中身 */
    .cmain-body {
      position: relative; z-index: 2;
      padding: 20px 22px 22px;
    }

    /* スワイプラベル */
    .slabel {
      position: absolute; z-index: 20;
      padding: 7px 14px; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 0.88rem; letter-spacing: 0.09em;
      opacity: 0; pointer-events: none; transition: opacity 0.05s;
    }
    .slabel.yes { top:18px; right:14px; transform:rotate(14deg);
      border: 2px solid rgba(244,114,182,0.75); color:#fda4af;
      background: rgba(190,24,93,0.1);
      box-shadow: 0 0 20px rgba(244,114,182,0.2); }
    .slabel.no  { top:18px; left:14px; transform:rotate(-14deg);
      border: 2px solid rgba(148,163,184,0.5); color:rgba(203,213,225,0.8);
      background: rgba(100,116,139,0.1); }

    /* ヘッダー行 */
    .chead {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }
    .cbadge {
      display: flex; align-items: center; gap: 7px;
      padding: 4px 11px 4px 8px; border-radius: 999px;
      background: rgba(244,114,182,0.08);
      border: 1px solid rgba(244,114,182,0.18);
    }
    .cbadge-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #f472b6; box-shadow: 0 0 8px rgba(244,114,182,1);
      animation: mbeat 1.5s ease-in-out infinite;
    }
    .cbadge-txt {
      font-family: 'Syne', sans-serif; font-size: 0.54rem;
      letter-spacing: 0.22em; text-transform: uppercase; color: #fda4af;
    }
    .cqnum {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.63rem; color: rgba(255,255,255,0.15);
    }

    /* 質問 */
    .cq-hint {
      font-size: 0.56rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(244,114,182,0.4); font-family: 'Syne', sans-serif;
      margin-bottom: 9px;
    }
    .cq-text {
      font-size: 1.08rem; font-weight: 500;
      line-height: 1.95; color: rgba(255,255,255,0.91);
      min-height: 68px; letter-spacing: 0.02em;
      margin-bottom: 18px;
    }

    /* カードフッター */
    .cfoot {
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .cfoot-sw {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.54rem; color: rgba(255,255,255,0.16);
      font-family: 'Syne', sans-serif; letter-spacing: 0.05em;
    }
    .cfoot-sw .pipe { color: rgba(255,255,255,0.1); }
    .cfoot-drag {
      display: flex; align-items: center; gap: 4px;
    }
    .drag-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: background 0.3s;
    }
    .drag-dot.on {
      background: linear-gradient(135deg,#f472b6,#e879f9);
      box-shadow: 0 0 6px rgba(244,114,182,0.7);
    }

    /* ══════════════════════════════
       ACTION AREA
    ══════════════════════════════ */
    .qaction {
      flex-shrink: 0;
      padding: 10px 18px 22px;
    }

    /* ── 5択スケールバー ── */
    .scale-bar {
      display: flex; gap: 6px;
      margin-bottom: 8px;
    }

    .sbtn {
      flex: 1; border: none; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 5px; border-radius: 14px;
      padding: 11px 4px 10px;
      position: relative; overflow: hidden;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.2s, filter 0.18s, border-color 0.18s;
      /* タップ時フィードバック */
    }
    .sbtn::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      opacity: 0; transition: opacity 0.3s;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15), transparent 70%);
    }
    .sbtn:hover::before { opacity: 1; }
    .sbtn:active { transform: scale(0.88) !important; filter: brightness(1.15); }

    /* 強く違う */
    .sb-1 {
      background: rgba(30,28,42,0.75);
      border: 1.5px solid rgba(100,116,139,0.3);
      box-shadow: 0 4px 16px rgba(0,0,0,0.45);
    }
    .sb-1:hover { transform: translateY(-3px); border-color: rgba(148,163,184,0.55); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }

    /* 違う */
    .sb-2 {
      background: rgba(35,30,50,0.65);
      border: 1.5px solid rgba(148,163,184,0.16);
    }
    .sb-2:hover { transform: translateY(-3px); border-color: rgba(148,163,184,0.38); }

    /* どちらでも */
    .sb-3 {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.1);
    }
    .sb-3:hover { transform: translateY(-2px); background: rgba(255,255,255,0.07); }

    /* そう思う */
    .sb-4 {
      background: rgba(180,24,93,0.12);
      border: 1.5px solid rgba(244,114,182,0.28);
    }
    .sb-4:hover { transform: translateY(-3px); border-color: rgba(244,114,182,0.55); box-shadow: 0 6px 20px rgba(180,24,93,0.2); }

    /* 強くそう思う */
    .sb-5 {
      background: linear-gradient(140deg, rgba(190,24,93,0.32), rgba(192,132,252,0.28));
      border: 1.5px solid rgba(244,114,182,0.5);
      box-shadow: 0 4px 20px rgba(190,24,93,0.28), inset 0 1px 0 rgba(255,255,255,0.07);
    }
    .sb-5:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 32px rgba(190,24,93,0.45); border-color: rgba(244,114,182,0.85); filter: brightness(1.08); }

    /* アイコン */
    .sb-icon { font-size: 1.45rem; line-height: 1; pointer-events: none; }
    .sb-1 .sb-icon, .sb-5 .sb-icon { font-size: 1.6rem; }
    .sb-3 .sb-icon { font-size: 1.25rem; }

    /* ラベル */
    .sb-label {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.46rem; letter-spacing: 0.04em;
      line-height: 1.4; text-align: center; pointer-events: none;
    }
    .sb-1 .sb-label { color: rgba(148,163,184,0.6); }
    .sb-2 .sb-label { color: rgba(148,163,184,0.45); }
    .sb-3 .sb-label { color: rgba(255,255,255,0.22); }
    .sb-4 .sb-label { color: rgba(249,168,212,0.7); }
    .sb-5 .sb-label { color: #fda4af; }

    /* スケールヒント */
    .scale-hint {
      display: flex; justify-content: space-between; padding: 0 2px;
      margin-bottom: 10px;
    }
    .scale-hint span {
      font-family: 'Syne', sans-serif; font-size: 0.5rem;
      letter-spacing: 0.08em; color: rgba(255,255,255,0.14);
    }

    /* 戻るボタン */
    .back-row { display: flex; justify-content: center; }
    .backbtn {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 9px 22px;
      color: rgba(255,255,255,0.2); cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 0.57rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      transition: all 0.2s;
    }
    .backbtn:hover:not(:disabled) {
      border-color: rgba(244,114,182,0.35); color: #fda4af;
      background: rgba(180,24,93,0.06);
    }
    .backbtn:disabled { opacity: 0.1; pointer-events: none; }

    /* ══════════════════════════════
       MATCH OVERLAY
    ══════════════════════════════ */
    .movl {
      position: fixed; inset: 0; z-index: 300; background: #0b0812;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      opacity: 0; pointer-events: none; transition: opacity 0.5s;
    }
    .movl.show { opacity: 1; pointer-events: all; }

    .movl-ring-wrap {
      position: relative; width: 88px; height: 88px;
      display: flex; align-items: center; justify-content: center;
    }
    .movl-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1.5px solid rgba(244,114,182,0.35);
      animation: rpulse 2s ease-out infinite;
    }
    .movl-ring:nth-child(2){ animation-delay: 0.7s; }
    @keyframes rpulse{
      0%{ transform:scale(1); opacity:0.7; }
      100%{ transform:scale(2.4); opacity:0; }
    }
    .movl-icon {
      font-size: 3.2rem; line-height: 1;
      animation: mpop 0.75s cubic-bezier(0.34,1.7,0.64,1) forwards; opacity: 0;
    }
    @keyframes mpop{ 0%{transform:scale(0) rotate(-25deg);opacity:0;} 100%{transform:scale(1) rotate(0);opacity:1;} }

    .movl-title {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.55rem;
      background: linear-gradient(135deg, #fda4af, #f472b6, #e879f9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-align: center;
    }
    .movl-sub {
      font-size: 0.68rem; color: rgba(255,255,255,0.26);
      letter-spacing: 0.2em; text-align: center;
    }
    .movl-chars { display: flex; gap: 12px; margin-bottom: 4px; }
    .movl-chars img {
      width: 50px; height: 50px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(244,114,182,0.2);
      opacity: 0; transform: scale(0.5) translateY(10px);
      transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .movl-chars img.show { opacity: 1; transform: scale(1) translateY(0); }
    .movl-bar-wrap {
      width: 220px; height: 4px; border-radius: 999px;
      background: rgba(255,255,255,0.05); overflow: hidden;
    }
    .movl-bar {
      height: 100%; width: 0%; border-radius: 999px;
      background: linear-gradient(90deg, #be185d, #f472b6, #c084fc);
      transition: width 0.14s;
      box-shadow: 0 0 10px rgba(244,114,182,0.5);
    }

    /* ══════════════════════════════
       CONFIRM
    ══════════════════════════════ */
    .covl {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.82); backdrop-filter: blur(28px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .covl.show { opacity: 1; pointer-events: all; }
    .csheet {
      width: 100%; max-width: 480px;
      background: rgba(14,10,22,0.98);
      border-radius: 28px 28px 0 0;
      border: 1px solid rgba(244,114,182,0.1); border-bottom: none;
      padding: 28px 22px 50px;
      transform: translateY(100%);
      transition: transform 0.34s cubic-bezier(0.4,0,0.2,1);
    }
    .covl.show .csheet { transform: translateY(0); }
    .chandle {
      width: 34px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.09); margin: 0 auto 22px;
    }
    .ctitle {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.15rem; text-align: center; color: #fff; margin-bottom: 7px;
    }
    .cdesc {
      font-size: 0.77rem; color: rgba(255,255,255,0.3);
      line-height: 1.7; text-align: center; margin-bottom: 20px;
    }
    .cyes {
      width: 100%; padding: 15px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, #be185d, #c084fc);
      color: #fff; font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.82rem; cursor: pointer; margin-bottom: 9px;
      box-shadow: 0 5px 20px rgba(180,24,93,0.35); transition: all 0.2s;
    }
    .cyes:hover { transform: translateY(-2px); box-shadow: 0 9px 28px rgba(180,24,93,0.5); }
    .cno {
      width: 100%; padding: 15px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent; color: rgba(255,255,255,0.3);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer;
      transition: all 0.2s;
    }
    .cno:hover { border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.55); }

    /* パーティクル */
    .pcanvas { position: fixed; inset: 0; z-index: 200; pointer-events: none; }
  </style>
</head>
<body>

<!-- BG -->
<div class="qbg">
  <div class="qbg-orb"></div>
  <div class="qbg-orb"></div>
  <div class="qbg-orb"></div>
</div>

<canvas class="pcanvas" id="pc"></canvas>

<!-- MATCH OVERLAY -->
<div class="movl" id="movl">
  <div class="movl-ring-wrap">
    <div class="movl-ring"></div>
    <div class="movl-ring"></div>
    <div class="movl-icon">💘</div>
  </div>
  <div class="movl-chars" id="movlChars"></div>
  <div class="movl-title">タイプを発見中…</div>
  <div class="movl-sub">あなたの夜の価値観を解析しています</div>
  <div class="movl-bar-wrap"><div class="movl-bar" id="movlBar"></div></div>
</div>

<!-- CONFIRM -->
<div class="covl" id="covl">
  <div class="csheet">
    <div class="chandle"></div>
    <div class="ctitle">最初からやり直す？</div>
    <div class="cdesc">これまでの回答がすべてリセットされます。</div>
    <button class="cyes" id="cyes">やり直す</button>
    <button class="cno"  id="cno">続ける</button>
  </div>
</div>

<!-- DRAWER -->
<div class="drawer" id="drawer">
  <a href="index.html"><span class="icon">🏠</span>ホーム</a>
  <a href="quiz.html" class="active"><span class="icon">🌙</span>診断する</a>
  <a href="characters.html"><span class="icon">🎴</span>キャラ一覧</a>
  <a href="compat.html"><span class="icon">💜</span>相性チェック</a>
  <a href="matrix.html"><span class="icon">📊</span>相性マトリクス</a>
</div>
<div class="drawer-overlay" id="drawer-overlay"></div>

<!-- MAIN PAGE -->
<div class="qpage">

  <!-- TOP -->
  <div class="qtop">
    <div class="qtop-row">
      <a href="index.html" class="qtop-logo" id="topLogo">NightType</a>
      <button class="hamburger" id="hamburger" style="position:static"><span></span><span></span><span></span></button>
    </div>

    <div class="meter-box">
      <div class="meter-row">
        <div class="meter-lhs">
          <div class="meter-dot"></div>
          Match Meter
        </div>
        <div class="meter-count"><strong id="qidx">1</strong> / 24</div>
      </div>
      <div class="meter-track">
        <div class="meter-fill" id="mfill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- CARD STACK -->
  <div class="card-stack">
    <div class="cback" id="cback">
      <div class="cbl"></div><div class="cbl"></div>
    </div>

    <div class="cmain" id="ccard">
      <div class="cmain-bg"></div>
      <div class="cmain-line"></div>
      <div class="cmain-body">
        <div class="slabel yes" id="lyes">LIKE ❤️</div>
        <div class="slabel no"  id="lno">NOPE ✕</div>

        <div class="chead">
          <div class="cbadge">
            <div class="cbadge-dot"></div>
            <span class="cbadge-txt">Night Prompt</span>
          </div>
          <div class="cqnum" id="qnum">01 / 24</div>
        </div>

        <div class="cq-hint">Q. あなたはどう感じる？</div>
        <p class="cq-text" id="qtext">読み込み中...</p>

        <div class="cfoot">
          <div class="cfoot-sw">
            <span>← NOPE</span>
            <span class="pipe">·</span>
            <span>LIKE →</span>
          </div>
          <div class="cfoot-drag" id="fdots"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="qaction">

    <!-- 5択スケールバー -->
    <div class="scale-bar">
      <button class="sbtn sb-1" data-val="-2">
        <span class="sb-icon">✕</span>
        <span class="sb-label">全く<br>違う</span>
      </button>
      <button class="sbtn sb-2" data-val="-1">
        <span class="sb-icon">😔</span>
        <span class="sb-label">どちら<br>かと言えば</span>
      </button>
      <button class="sbtn sb-3" data-val="0">
        <span class="sb-icon">🌫</span>
        <span class="sb-label">どちら<br>でも</span>
      </button>
      <button class="sbtn sb-4" data-val="1">
        <span class="sb-icon">🌙</span>
        <span class="sb-label">どちら<br>かと言えば</span>
      </button>
      <button class="sbtn sb-5" data-val="2">
        <span class="sb-icon">❤️</span>
        <span class="sb-label">とても<br>そう思う</span>
      </button>
    </div>

    <div class="scale-hint">
      <span>← 違う</span>
      <span>そう思う →</span>
    </div>

    <div class="back-row">
      <button class="backbtn" id="backbtn" disabled>
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        前の質問に戻る
      </button>
    </div>
  </div>

</div><!-- /qpage -->

<script src="./questions.js"></script>
<script src="./types.js"></script>
<script>
/* ── State ── */
let idx = 0;
const scores = {}, history = [];

/* ── Refs ── */
const card    = document.getElementById('ccard');
const cback   = document.getElementById('cback');
const qtext   = document.getElementById('qtext');
const qnum    = document.getElementById('qnum');
const qidx    = document.getElementById('qidx');
const mfill   = document.getElementById('mfill');
const overlay = document.getElementById('movl');
const bar     = document.getElementById('movlBar');
const backbtn = document.getElementById('backbtn');
const lyes    = document.getElementById('lyes');
const lno     = document.getElementById('lno');
const pcan    = document.getElementById('pc');
const pctx    = pcan.getContext('2d');
const fdots   = document.getElementById('fdots');

function resize(){ pcan.width = innerWidth; pcan.height = innerHeight; }
resize(); addEventListener('resize', resize);

/* キャラ */
Object.keys(types).slice(0,5).forEach(k => {
  const t = types[k]; if(!t.image) return;
  const img = document.createElement('img'); img.src = t.image;
  document.getElementById('movlChars').appendChild(img);
});

if(new URLSearchParams(location.search).get('restart') === '1')
  localStorage.removeItem('nightTypeScores');

/* ── Foot dots ── */
function buildDots(){
  fdots.innerHTML = '';
  const n = Math.min(5, questions.length);
  for(let i = 0; i < n; i++){
    const d = document.createElement('div');
    d.className = 'drag-dot' + (i === Math.min(idx, n-1) ? ' on' : '');
    fdots.appendChild(d);
  }
}

/* ── Show ── */
function pad(n){ return n < 10 ? '0'+n : ''+n; }
function show(){
  qtext.textContent = questions[idx].text;
  qnum.textContent  = pad(idx+1) + ' / ' + questions.length;
  qidx.textContent  = idx + 1;
  backbtn.disabled  = idx === 0;
  cback.classList.toggle('peek', idx + 1 < questions.length);
  mfill.style.width = (idx / questions.length * 100) + '%';
  buildDots();
}

/* ── Sound ── */
let ac = null;
function sound(val){
  try{
    if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination); o.type='sine';
    const m={2:[550,840],1:[475,660],0:[360,360],'-1':[325,215],'-2':[285,155]};
    const [f0,f1]=m[val]||[360,360];
    o.frequency.setValueAtTime(f0,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1,10),ac.currentTime+0.13);
    g.gain.setValueAtTime(0.1,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.22);
    o.start(); o.stop(ac.currentTime+0.3);
  }catch(e){}
}

/* ── Particles ── */
let parts = [];
function spawnParts(val, x, y){
  const pos = val > 0;
  const col = pos
    ? ['#f472b6','#fda4af','#e879f9','#fb7185','#c084fc']
    : val === 0 ? ['#94a3b8','#cbd5e1']
    : ['#64748b','#94a3b8'];
  const n = pos ? (val===2?30:20) : val===0 ? 8 : 14;
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*0.7;
    const s=2.5+Math.random()*4.5*(Math.abs(val)/2||0.4);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-(pos?3.2:0.5),
      col:col[i%col.length],r:pos?3.5+Math.random()*6:2.5+Math.random()*4,
      life:1,dec:0.022+Math.random()*0.02,g:0.22,
      heart:val===2&&Math.random()<0.5});
  }
}
function animP(){
  pctx.clearRect(0,0,pcan.width,pcan.height);
  parts = parts.filter(p=>p.life>0);
  parts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=0.97;p.life-=p.dec;
    pctx.globalAlpha=Math.max(0,p.life);
    if(p.heart){ pctx.font=`${Math.max(4,p.r*1.9*p.life)}px sans-serif`; pctx.fillText('❤',p.x,p.y); }
    else{ pctx.fillStyle=p.col; pctx.beginPath(); pctx.arc(p.x,p.y,Math.max(0.1,p.r*p.life),0,Math.PI*2); pctx.fill(); }
    pctx.globalAlpha=1;
  });
  if(parts.length) requestAnimationFrame(animP);
  else pctx.clearRect(0,0,pcan.width,pcan.height);
}

/* ── Fly ── */
function fly(right, cb){
  const tx = right ? innerWidth*1.45 : -innerWidth*1.45;
  card.style.transition = 'transform .38s cubic-bezier(.5,0,1,.5),opacity .32s';
  card.style.transform  = `translateX(${tx}px) rotate(${right?25:-25}deg)`;
  card.style.opacity    = '0';
  cback.style.transition = 'transform .35s cubic-bezier(.34,1.2,.64,1),opacity .32s';
  cback.style.transform = 'scale(1) translateY(0)'; cback.style.opacity = '0.6';
  setTimeout(()=>{
    card.style.transition=cback.style.transition='';
    card.style.transform=card.style.opacity='';
    cback.style.transform=cback.style.opacity='';
    cb();
  },370);
}

/* ── Answer ── */
function answer(val){
  history.push({type:questions[idx].type,val});
  scores[questions[idx].type]=(scores[questions[idx].type]||0)+val;
  sound(val);
  const r=card.getBoundingClientRect();
  spawnParts(val,r.left+r.width/2,r.top+r.height/2);
  requestAnimationFrame(animP);
  idx++;
  if(idx<questions.length){
    fly(val>=0,show);
  }else{
    fly(val>=0,()=>{
      localStorage.setItem('nightTypeScores',JSON.stringify(scores));
      overlay.classList.add('show');
      document.getElementById('movlChars').querySelectorAll('img')
        .forEach((im,i)=>setTimeout(()=>im.classList.add('show'),i*200));
      let p=0;
      const iv=setInterval(()=>{
        p=Math.min(p+2,100); bar.style.width=p+'%';
        if(p>=100){ clearInterval(iv); setTimeout(()=>location.href='result.html',450); }
      },30);
    });
  }
}

/* ── Buttons ── */
document.querySelectorAll('.sbtn').forEach(b=>{
  b.addEventListener('click',()=>answer(+b.dataset.val));
});

backbtn.addEventListener('click',()=>{
  if(!history.length)return;
  const last=history.pop(); idx--;
  scores[last.type]=(scores[last.type]||0)-last.val;
  card.style.transition='transform .38s cubic-bezier(.34,1.3,.64,1),opacity .26s';
  card.style.transform='scale(0.93) translateY(10px)'; card.style.opacity='0.45';
  setTimeout(()=>{ card.style.transition=card.style.transform=card.style.opacity=''; show(); },240);
});

/* ── Swipe ── */
let sx=0,sy=0,drag=false,cx=0;
const T1=60,T2=110;
function ds(x,y){ sx=x;sy=y;drag=true;cx=0; }
function dm(x,y){
  if(!drag)return;
  const dx=x-sx,dy=y-sy;
  if(Math.abs(dy)>Math.abs(dx)*1.5){ drag=false; rc(); return; }
  cx=dx;
  const r=Math.min(Math.abs(dx)/T2,1);
  card.style.transform=`translateX(${dx*.52}px) rotate(${dx*.036}deg)`;
  if(dx>12){
    lyes.style.opacity=Math.min(r*1.4,1); lno.style.opacity=0;
    card.style.boxShadow=`0 0 0 2px rgba(244,114,182,${.55*r}),0 24px 70px rgba(0,0,0,.7),0 0 50px rgba(180,24,93,${.18*r})`;
  }else if(dx<-12){
    lno.style.opacity=Math.min(r*1.4,1); lyes.style.opacity=0;
    card.style.boxShadow=`0 0 0 2px rgba(148,163,184,${.38*r}),0 24px 70px rgba(0,0,0,.7)`;
  }else{ lyes.style.opacity=lno.style.opacity=0; card.style.boxShadow=''; }
}
function rc(){
  lyes.style.opacity=lno.style.opacity=0; card.style.boxShadow='';
  card.style.transition='transform .48s cubic-bezier(.34,1.56,.64,1)';
  card.style.transform='';
  setTimeout(()=>card.style.transition='',480);
}
function de(){
  if(!drag)return; drag=false;
  if(cx>T2) answer(2); else if(cx>T1) answer(1);
  else if(cx<-T2) answer(-2); else if(cx<-T1) answer(-1);
  else rc();
}
card.addEventListener('touchstart',e=>ds(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
card.addEventListener('touchmove', e=>dm(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
card.addEventListener('touchend',de);
card.addEventListener('mousedown',e=>{ ds(e.clientX,e.clientY); card.style.cursor='grabbing'; });
addEventListener('mousemove',e=>dm(e.clientX,e.clientY));
addEventListener('mouseup',()=>{ card.style.cursor=''; de(); });

/* ── Confirm ── */
const covl=document.getElementById('covl');
document.getElementById('topLogo').addEventListener('click',e=>{ if(idx>0){ e.preventDefault(); covl.classList.add('show'); } });
document.getElementById('cyes').addEventListener('click',()=>location.href='quiz.html?restart=1');
document.getElementById('cno').addEventListener('click', ()=>covl.classList.remove('show'));

show();
</script>
<script src="./common.js"></script>
</body>
</html>
