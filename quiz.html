<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>診断｜ナイトタイプ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./style.css"/>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { overflow: hidden; font-family: 'Noto Sans JP', sans-serif; background: #0c0910; }

    /* ════════════════════════
       BACKGROUND
    ════════════════════════ */
    .quiz-bg {
      position: fixed; inset: 0; z-index: 0;
      background: #0c0910;
    }
    .quiz-bg::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 0% 0%,   rgba(200,40,100,0.14) 0%, transparent 55%),
        radial-gradient(ellipse 70% 55% at 100% 100%, rgba(100,40,200,0.16) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(255,80,150,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); animation: orbDrift 14s ease-in-out infinite;
    }
    .orb-1 { width:500px;height:500px;background:radial-gradient(circle,rgba(190,30,90,0.28),transparent 65%);top:-160px;left:-120px;animation-delay:0s; }
    .orb-2 { width:380px;height:380px;background:radial-gradient(circle,rgba(100,30,200,0.22),transparent 65%);bottom:-80px;right:-100px;animation-delay:-5s; }
    .orb-3 { width:250px;height:250px;background:radial-gradient(circle,rgba(220,60,140,0.15),transparent 65%);top:40%;left:45%;animation-delay:-9s; }
    @keyframes orbDrift {
      0%,100%{ transform:translate(0,0) scale(1); }
      35%{ transform:translate(28px,-32px) scale(1.06); }
      70%{ transform:translate(-22px,24px) scale(0.94); }
    }

    /* ════════════════════════
       LAYOUT
    ════════════════════════ */
    .quiz-page {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
    }

    /* ════════════════════════
       TOP BAR
    ════════════════════════ */
    .quiz-topbar {
      padding: 54px 22px 0; flex-shrink: 0;
    }
    .topbar-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }
    .topbar-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.05rem;
      background: linear-gradient(110deg, #f472b6 0%, #e879f9 50%, #818cf8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none; letter-spacing: 0.06em;
      filter: drop-shadow(0 0 12px rgba(244,114,182,0.3));
    }

    /* ────── MATCH METER ────── */
    .match-meter {
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.065);
      border-radius: 16px; padding: 12px 16px;
      backdrop-filter: blur(12px);
    }
    .meter-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 9px;
    }
    .meter-label {
      display: flex; align-items: center; gap: 7px;
      font-family: 'Syne', sans-serif; font-size: 0.58rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.28);
    }
    .meter-heart {
      width: 8px; height: 8px; border-radius: 50%;
      background: linear-gradient(135deg, #f472b6, #c084fc);
      box-shadow: 0 0 10px rgba(244,114,182,0.9);
      animation: hbeat 1.4s ease-in-out infinite;
    }
    @keyframes hbeat { 0%,100%{transform:scale(1);} 40%{transform:scale(1.6);} }
    .meter-counter {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.72rem; color: rgba(255,255,255,0.4);
    }
    .meter-counter em { color: #f9a8d4; font-style: normal; font-size: 0.95rem; }

    .meter-track {
      position: relative; height: 5px; border-radius: 999px;
      background: rgba(255,255,255,0.06); overflow: visible;
    }
    .meter-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #be185d 0%, #f472b6 50%, #c084fc 100%);
      background-size: 200% 100%;
      animation: gradMove 3s linear infinite;
      transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 12px rgba(244,114,182,0.55);
      position: relative;
    }
    @keyframes gradMove { 0%{background-position:0%} 100%{background-position:200%} }
    .meter-fill::after {
      content: '❤';
      position: absolute; right: -10px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px; line-height: 1;
      filter: drop-shadow(0 0 8px rgba(244,114,182,1));
      animation: hbeat 1.4s ease-in-out infinite;
    }

    /* ════════════════════════
       CARD STACK
    ════════════════════════ */
    .card-stack {
      flex: 1; position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 10px 16px 0;
    }

    /* 背面カード */
    .q-card-back {
      position: absolute;
      width: calc(100% - 56px); max-width: 400px;
      border-radius: 30px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 28px;
      transform: scale(0.93) translateY(18px);
      opacity: 0.35;
      pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s;
    }
    .q-card-back.peek { transform: scale(0.96) translateY(10px); opacity: 0.5; }
    .bl { height:10px;border-radius:5px;background:rgba(255,255,255,0.04);margin-bottom:10px; }
    .bl:last-child{width:55%;}

    /* メインカード */
    .q-card-main {
      position: relative; z-index: 5;
      width: calc(100% - 24px); max-width: 440px;
      border-radius: 30px;
      overflow: hidden;
      cursor: grab; user-select: none; touch-action: pan-y;
      will-change: transform;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 24px 70px rgba(0,0,0,0.7),
        0 8px 24px rgba(190,24,93,0.1);
    }
    .q-card-main:active { cursor: grabbing; }

    /* カードグラデーション背景 */
    .card-bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        linear-gradient(160deg, rgba(190,24,93,0.12) 0%, rgba(12,9,16,0.0) 45%),
        rgba(255,255,255,0.05);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }

    /* カード上部カラーライン */
    .card-line {
      position: relative; z-index: 2;
      height: 3px;
      background: linear-gradient(90deg, #be185d, #f472b6, #c084fc, #818cf8, #f472b6);
      background-size: 300% 100%;
      animation: gradMove 4s linear infinite;
    }

    /* カード内コンテンツ */
    .card-body {
      position: relative; z-index: 2;
      padding: 22px 24px 26px;
    }

    .card-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .card-badge {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 12px 5px 9px; border-radius: 999px;
      background: rgba(244,114,182,0.1);
      border: 1px solid rgba(244,114,182,0.2);
    }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #f472b6;
      box-shadow: 0 0 8px rgba(244,114,182,1);
      animation: hbeat 1.4s ease-in-out infinite;
    }
    .badge-text {
      font-family: 'Syne', sans-serif; font-size: 0.56rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: #fda4af;
    }
    .card-qnum {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.65rem; color: rgba(255,255,255,0.16);
      letter-spacing: 0.05em;
    }

    /* 質問テキスト */
    .card-question-wrap { margin-bottom: 22px; }
    .card-question-hint {
      font-size: 0.58rem; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(244,114,182,0.45);
      font-family: 'Syne', sans-serif; margin-bottom: 10px;
    }
    .card-question {
      font-size: 1.14rem; font-weight: 500;
      line-height: 1.95; color: rgba(255,255,255,0.92);
      min-height: 72px; letter-spacing: 0.025em;
    }

    /* カード下部 */
    .card-foot {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.055);
    }
    .card-foot-l {
      display: flex; align-items: center; gap: 8px;
    }
    .foot-swipe-hint {
      font-size: 0.56rem; color: rgba(255,255,255,0.18);
      font-family: 'Syne', sans-serif; letter-spacing: 0.06em;
    }
    .foot-arrow { color: rgba(255,255,255,0.12); font-size: 0.7rem; }
    .card-foot-r {
      display: flex; align-items: center; gap: 5px;
    }
    .foot-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
    }
    .foot-dot.active {
      background: linear-gradient(135deg, #f472b6, #c084fc);
      box-shadow: 0 0 6px rgba(244,114,182,0.7);
    }

    /* ════════════════════════
       SWIPE LABELS
    ════════════════════════ */
    .swipe-label {
      position: absolute; z-index: 20;
      padding: 8px 16px; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 0.92rem; letter-spacing: 0.1em;
      opacity: 0; pointer-events: none; transition: opacity 0.05s;
    }
    .swipe-label.yes {
      top: 20px; right: 16px; transform: rotate(15deg);
      background: rgba(219,39,119,0.12);
      border: 2px solid rgba(244,114,182,0.7);
      color: #fda4af;
      box-shadow: 0 0 24px rgba(244,114,182,0.25);
    }
    .swipe-label.no {
      top: 20px; left: 16px; transform: rotate(-15deg);
      background: rgba(100,116,139,0.12);
      border: 2px solid rgba(148,163,184,0.5);
      color: rgba(203,213,225,0.85);
    }

    /* ════════════════════════
       ACTION AREA
    ════════════════════════ */
    .action-area {
      flex-shrink: 0; padding: 10px 18px 24px;
    }

    /* 5択ボタン */
    .five-btns {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 10px; margin-bottom: 9px;
    }

    .btn-5 {
      border: none; cursor: pointer; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative; flex-shrink: 0;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s, filter 0.18s;
    }
    .btn-5:active { transform: scale(0.8) !important; }
    .btn-5-emoji { line-height: 1; pointer-events: none; }

    /* NOPE – 大・左 */
    .btn-5-5 {
      width: 70px; height: 70px;
      background: rgba(22,20,32,0.8);
      border: 2px solid rgba(148,163,184,0.28);
      box-shadow: 0 6px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .btn-5-5:hover { transform: scale(1.1) translateY(-2px); border-color: rgba(148,163,184,0.55); box-shadow: 0 12px 32px rgba(0,0,0,0.6); }
    .btn-5-5 .btn-5-emoji { font-size: 1.7rem; }

    /* 違う – 中・左 */
    .btn-5-4 {
      width: 52px; height: 52px;
      background: rgba(22,20,32,0.6);
      border: 1.5px solid rgba(148,163,184,0.18);
    }
    .btn-5-4:hover { transform: scale(1.08); border-color: rgba(148,163,184,0.4); }
    .btn-5-4 .btn-5-emoji { font-size: 1.25rem; }

    /* どちらでも – 小・中央 */
    .btn-5-3 {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.09);
    }
    .btn-5-3:hover { transform: scale(1.1); background: rgba(255,255,255,0.08); }
    .btn-5-3 .btn-5-emoji { font-size: 1.1rem; }

    /* そう思う – 中・右 */
    .btn-5-2 {
      width: 52px; height: 52px;
      background: rgba(190,24,93,0.12);
      border: 1.5px solid rgba(244,114,182,0.3);
    }
    .btn-5-2:hover { transform: scale(1.08); border-color: rgba(244,114,182,0.6); box-shadow: 0 4px 20px rgba(219,39,119,0.2); }
    .btn-5-2 .btn-5-emoji { font-size: 1.25rem; }

    /* LIKE – 大・右 */
    .btn-5-1 {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, rgba(190,24,93,0.4), rgba(192,132,252,0.35));
      border: 2px solid rgba(244,114,182,0.55);
      box-shadow: 0 6px 28px rgba(190,24,93,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .btn-5-1:hover { transform: scale(1.12) translateY(-3px); box-shadow: 0 14px 40px rgba(190,24,93,0.5); border-color: rgba(244,114,182,0.9); filter: brightness(1.1); }
    .btn-5-1 .btn-5-emoji { font-size: 1.8rem; }

    /* ボタンラベル */
    .btn-labels {
      display: flex; justify-content: space-between; padding: 0 6px;
      margin-bottom: 10px;
    }
    .btn-labels span {
      font-family: 'Syne', sans-serif; font-size: 0.5rem;
      letter-spacing: 0.08em; color: rgba(255,255,255,0.16);
    }

    /* 戻るボタン */
    .sub-area { display: flex; justify-content: center; }
    .btn-back {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.065);
      border-radius: 12px; padding: 9px 22px;
      color: rgba(255,255,255,0.22); cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 0.58rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      transition: all 0.22s;
    }
    .btn-back:hover:not(:disabled) {
      border-color: rgba(244,114,182,0.4);
      color: #fda4af;
      background: rgba(190,24,93,0.07);
    }
    .btn-back:disabled { opacity: 0.12; pointer-events: none; }

    /* ════════════════════════
       MATCH FOUND OVERLAY
    ════════════════════════ */
    .match-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: #0c0910;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      opacity: 0; pointer-events: none; transition: opacity 0.55s;
    }
    .match-overlay.show { opacity: 1; pointer-events: all; }

    .match-heart-wrap {
      position: relative; width: 90px; height: 90px;
      display: flex; align-items: center; justify-content: center;
    }
    .match-heart-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid rgba(244,114,182,0.3);
      animation: ringPulse 1.8s ease-out infinite;
    }
    .match-heart-ring:nth-child(2) { animation-delay: 0.6s; }
    @keyframes ringPulse {
      0%{ transform:scale(1); opacity:0.6; }
      100%{ transform:scale(2.2); opacity:0; }
    }
    .match-heart-icon {
      font-size: 3.4rem; line-height: 1;
      animation: matchPop 0.7s cubic-bezier(0.34,1.7,0.64,1) forwards;
      opacity: 0;
    }
    @keyframes matchPop {
      0%{ transform:scale(0) rotate(-20deg); opacity:0; }
      100%{ transform:scale(1) rotate(0); opacity:1; }
    }

    .match-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.65rem; letter-spacing: -0.01em;
      background: linear-gradient(135deg, #fda4af, #f472b6, #e879f9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-align: center;
    }
    .match-sub {
      font-size: 0.7rem; color: rgba(255,255,255,0.28);
      letter-spacing: 0.2em; text-align: center;
    }
    .match-chars { display: flex; gap: 14px; margin-bottom: 2px; }
    .match-chars img {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(244,114,182,0.25);
      opacity: 0; transform: scale(0.5) translateY(12px);
      transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .match-chars img.show { opacity: 1; transform: scale(1) translateY(0); }
    .match-bar-wrap {
      width: 230px; height: 4px;
      background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden;
    }
    .match-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #be185d, #f472b6, #c084fc);
      border-radius: 999px; transition: width 0.14s;
      box-shadow: 0 0 10px rgba(244,114,182,0.5);
    }

    /* ════════════════════════
       CONFIRM DIALOG
    ════════════════════════ */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(24px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.26s;
    }
    .confirm-overlay.show { opacity: 1; pointer-events: all; }
    .confirm-sheet {
      width: 100%; max-width: 480px;
      background: rgba(16,12,24,0.98);
      border-radius: 28px 28px 0 0;
      border: 1px solid rgba(244,114,182,0.12); border-bottom: none;
      padding: 30px 24px 52px;
      transform: translateY(100%);
      transition: transform 0.34s cubic-bezier(0.4,0,0.2,1);
    }
    .confirm-overlay.show .confirm-sheet { transform: translateY(0); }
    .confirm-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.1); margin: 0 auto 22px;
    }
    .confirm-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.18rem; text-align: center; color: #fff; margin-bottom: 8px;
    }
    .confirm-desc {
      font-size: 0.78rem; color: rgba(255,255,255,0.32);
      line-height: 1.75; text-align: center; margin-bottom: 22px;
    }
    .confirm-yes {
      width: 100%; padding: 16px; border-radius: 16px; border: none;
      background: linear-gradient(135deg, #be185d, #c084fc);
      color: #fff; font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.84rem; cursor: pointer; margin-bottom: 10px;
      box-shadow: 0 6px 22px rgba(190,24,93,0.35);
      transition: all 0.22s;
    }
    .confirm-yes:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(190,24,93,0.5); }
    .confirm-no {
      width: 100%; padding: 16px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent; color: rgba(255,255,255,0.32);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.84rem;
      cursor: pointer; transition: all 0.2s;
    }
    .confirm-no:hover { border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.55); }

    /* ════════════════════════
       PARTICLES
    ════════════════════════ */
    .particle-canvas { position: fixed; inset: 0; z-index: 200; pointer-events: none; }
  </style>
</head>
<body>

<!-- 背景 -->
<div class="quiz-bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<canvas class="particle-canvas" id="particleCanvas"></canvas>

<!-- マッチ発見 -->
<div class="match-overlay" id="matchOverlay">
  <div class="match-heart-wrap">
    <div class="match-heart-ring"></div>
    <div class="match-heart-ring"></div>
    <div class="match-heart-icon">💘</div>
  </div>
  <div class="match-chars" id="matchChars"></div>
  <div class="match-title">タイプを発見中…</div>
  <div class="match-sub">あなたの夜の価値観を解析しています</div>
  <div class="match-bar-wrap"><div class="match-bar" id="matchBar"></div></div>
</div>

<!-- 確認ダイアログ -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-sheet">
    <div class="confirm-handle"></div>
    <div class="confirm-title">最初からやり直す？</div>
    <div class="confirm-desc">これまでの回答がすべてリセットされます。</div>
    <button class="confirm-yes" id="confirmYes">やり直す</button>
    <button class="confirm-no"  id="confirmNo">続ける</button>
  </div>
</div>

<!-- ドロワー -->
<div class="drawer" id="drawer">
  <a href="index.html"><span class="icon">🏠</span>ホーム</a>
  <a href="quiz.html" class="active"><span class="icon">🌙</span>診断する</a>
  <a href="characters.html"><span class="icon">🎴</span>キャラ一覧</a>
  <a href="compat.html"><span class="icon">💜</span>相性チェック</a>
  <a href="matrix.html"><span class="icon">📊</span>相性マトリクス</a>
</div>
<div class="drawer-overlay" id="drawer-overlay"></div>

<!-- メイン -->
<div class="quiz-page">

  <!-- トップバー -->
  <div class="quiz-topbar">
    <div class="topbar-row">
      <a href="index.html" class="topbar-logo" id="topbarLogo">NightType</a>
      <button class="hamburger" id="hamburger" style="position:static"><span></span><span></span><span></span></button>
    </div>

    <!-- マッチメーター -->
    <div class="match-meter">
      <div class="meter-top">
        <div class="meter-label">
          <div class="meter-heart"></div>
          Match Meter
        </div>
        <div class="meter-counter"><em id="currentQ">1</em> / 24</div>
      </div>
      <div class="meter-track">
        <div class="meter-fill" id="meterFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- カードスタック -->
  <div class="card-stack">
    <div class="q-card-back" id="qCardBack">
      <div class="bl"></div><div class="bl"></div>
    </div>

    <div class="q-card-main" id="qCard">
      <div class="card-bg"></div>
      <div class="card-line"></div>
      <div class="card-body">
        <div class="swipe-label yes" id="labelYes">LIKE ❤️</div>
        <div class="swipe-label no"  id="labelNo">NOPE ✕</div>

        <div class="card-head">
          <div class="card-badge">
            <div class="badge-dot"></div>
            <span class="badge-text">Night Prompt</span>
          </div>
          <div class="card-qnum" id="qNum">01 / 24</div>
        </div>

        <div class="card-question-wrap">
          <div class="card-question-hint">Q. あなたはどう感じる？</div>
          <p class="card-question" id="question">読み込み中...</p>
        </div>

        <div class="card-foot">
          <div class="card-foot-l">
            <span class="foot-swipe-hint">← NOPE</span>
            <span class="foot-arrow">/</span>
            <span class="foot-swipe-hint">LIKE →</span>
          </div>
          <div class="card-foot-r" id="footDots"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- アクション -->
  <div class="action-area">
    <div class="five-btns">
      <!-- 強く違う -->
      <button class="btn-5 btn-5-5" data-val="-2" title="全く違う">
        <div class="btn-5-emoji">✕</div>
      </button>
      <!-- 違う -->
      <button class="btn-5 btn-5-4" data-val="-1" title="違う">
        <div class="btn-5-emoji">😔</div>
      </button>
      <!-- どちらでも -->
      <button class="btn-5 btn-5-3" data-val="0" title="どちらでもない">
        <div class="btn-5-emoji">🌫</div>
      </button>
      <!-- そう思う -->
      <button class="btn-5 btn-5-2" data-val="1" title="そう思う">
        <div class="btn-5-emoji">🌙</div>
      </button>
      <!-- 強くそう思う -->
      <button class="btn-5 btn-5-1" data-val="2" title="強くそう思う">
        <div class="btn-5-emoji">❤️</div>
      </button>
    </div>

    <div class="btn-labels">
      <span>← 全く違う</span>
      <span>強くそう思う →</span>
    </div>

    <div class="sub-area">
      <button class="btn-back" id="backBtn" disabled>
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        前の質問に戻る
      </button>
    </div>
  </div>
</div>

<script src="./questions.js"></script>
<script src="./types.js"></script>
<script>
/* ─────────────────────────────
   STATE
───────────────────────────── */
let idx = 0;
const scores = {}, history = [];

/* ─────────────────────────────
   ELEMENTS
───────────────────────────── */
const card       = document.getElementById('qCard');
const cardBack   = document.getElementById('qCardBack');
const qEl        = document.getElementById('question');
const qNum       = document.getElementById('qNum');
const currentQ   = document.getElementById('currentQ');
const meterFill  = document.getElementById('meterFill');
const overlay    = document.getElementById('matchOverlay');
const bar        = document.getElementById('matchBar');
const backBtn    = document.getElementById('backBtn');
const labelYes   = document.getElementById('labelYes');
const labelNo    = document.getElementById('labelNo');
const pCanvas    = document.getElementById('particleCanvas');
const pCtx       = pCanvas.getContext('2d');
const footDots   = document.getElementById('footDots');

/* ─────────────────────────────
   CANVAS RESIZE
───────────────────────────── */
function resizePC(){ pCanvas.width=innerWidth; pCanvas.height=innerHeight; }
resizePC(); addEventListener('resize', resizePC);

/* ─────────────────────────────
   INIT: キャラ読み込み
───────────────────────────── */
Object.keys(types).slice(0,5).forEach(k => {
  const t = types[k]; if(!t.image) return;
  const img = document.createElement('img');
  img.src = t.image;
  document.getElementById('matchChars').appendChild(img);
});

if(new URLSearchParams(location.search).get('restart') === '1'){
  localStorage.removeItem('nightTypeScores');
}

/* ─────────────────────────────
   FOOTER DOTS (直近3問)
───────────────────────────── */
function buildFootDots(){
  footDots.innerHTML = '';
  const total = Math.min(5, questions.length);
  for(let i = 0; i < total; i++){
    const d = document.createElement('div');
    d.className = 'foot-dot' + (i === Math.min(idx, total-1) ? ' active' : '');
    footDots.appendChild(d);
  }
}

/* ─────────────────────────────
   SHOW QUESTION
───────────────────────────── */
function pad(n){ return n < 10 ? '0'+n : ''+n; }

function show(){
  qEl.textContent = questions[idx].text;
  qNum.textContent = pad(idx+1) + ' / ' + questions.length;
  currentQ.textContent = idx + 1;
  backBtn.disabled = idx === 0;
  cardBack.classList.toggle('peek', idx+1 < questions.length);
  // メーター
  meterFill.style.width = (idx / questions.length * 100) + '%';
  buildFootDots();
}

/* ─────────────────────────────
   SOUND
───────────────────────────── */
let ac = null;
function playSound(val){
  try{
    if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ac.createOscillator(), gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    const map = {2:[540,820],1:[470,650],0:[360,360],'-1':[330,220],'-2':[290,160]};
    const [f0,f1] = map[val] || [360,360];
    osc.frequency.setValueAtTime(f0, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(Math.max(f1,10), ac.currentTime+0.13);
    gain.gain.setValueAtTime(0.11, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.22);
    osc.start(); osc.stop(ac.currentTime+0.3);
  }catch(e){}
}

/* ─────────────────────────────
   PARTICLES
───────────────────────────── */
let particles = [];
function spawnP(val, x, y){
  const pos = val > 0;
  const col = pos
    ? ['#f472b6','#fda4af','#e879f9','#fb7185','#c084fc']
    : val === 0
    ? ['#94a3b8','#cbd5e1']
    : ['#64748b','#94a3b8','#cbd5e1'];
  const n = pos ? (val===2?28:18) : val===0 ? 8 : 14;
  for(let i=0;i<n;i++){
    const a = (Math.PI*2/n)*i + Math.random()*0.7;
    const s = 2.5 + Math.random()*4.5*(Math.abs(val)/2||0.4);
    particles.push({
      x, y,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s - (pos?3:0.5),
      color: col[i%col.length],
      size: pos ? 3.5+Math.random()*6 : 2.5+Math.random()*4,
      life: 1, decay: 0.022+Math.random()*0.02, gravity: 0.22,
      heart: val===2 && Math.random()<0.45
    });
  }
}
function animateP(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.97; p.life-=p.decay;
    pCtx.globalAlpha = Math.max(0,p.life);
    if(p.heart){
      pCtx.font = `${Math.max(4,p.size*1.9*p.life)}px sans-serif`;
      pCtx.fillText('❤',p.x,p.y);
    } else {
      pCtx.fillStyle = p.color;
      pCtx.beginPath();
      pCtx.arc(p.x,p.y,Math.max(0.1,p.size*p.life),0,Math.PI*2);
      pCtx.fill();
    }
    pCtx.globalAlpha = 1;
  });
  if(particles.length) requestAnimationFrame(animateP);
  else pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
}

/* ─────────────────────────────
   CARD FLY
───────────────────────────── */
function flyCard(right, cb){
  const tx = right ? innerWidth*1.45 : -innerWidth*1.45;
  card.style.transition = 'transform 0.38s cubic-bezier(0.5,0,1,0.5), opacity 0.32s';
  card.style.transform  = `translateX(${tx}px) rotate(${right?26:-26}deg)`;
  card.style.opacity    = '0';
  cardBack.style.transition = 'transform 0.34s cubic-bezier(0.34,1.2,0.64,1), opacity 0.32s';
  cardBack.style.transform  = 'scale(1) translateY(0)';
  cardBack.style.opacity    = '0.6';
  setTimeout(()=>{
    card.style.transition = cardBack.style.transition = '';
    card.style.transform  = card.style.opacity = '';
    cardBack.style.transform = cardBack.style.opacity = '';
    cb();
  }, 360);
}

/* ─────────────────────────────
   ANSWER
───────────────────────────── */
function answer(val){
  history.push({ type: questions[idx].type, val });
  scores[questions[idx].type] = (scores[questions[idx].type]||0) + val;
  playSound(val);
  const r = card.getBoundingClientRect();
  spawnP(val, r.left+r.width/2, r.top+r.height/2);
  requestAnimationFrame(animateP);
  idx++;
  if(idx < questions.length){
    flyCard(val>=0, show);
  } else {
    flyCard(val>=0, ()=>{
      localStorage.setItem('nightTypeScores', JSON.stringify(scores));
      overlay.classList.add('show');
      document.getElementById('matchChars').querySelectorAll('img')
        .forEach((im,i)=>setTimeout(()=>im.classList.add('show'), i*200));
      let p = 0;
      const iv = setInterval(()=>{
        p = Math.min(p+2, 100);
        bar.style.width = p+'%';
        if(p>=100){ clearInterval(iv); setTimeout(()=>location.href='result.html', 450); }
      }, 30);
    });
  }
}

/* ─────────────────────────────
   BUTTON HANDLERS
───────────────────────────── */
document.querySelectorAll('.btn-5').forEach(btn=>{
  btn.addEventListener('click', ()=>answer(parseInt(btn.dataset.val)));
});

backBtn.addEventListener('click', ()=>{
  if(!history.length) return;
  const last = history.pop(); idx--;
  scores[last.type] = (scores[last.type]||0) - last.val;
  card.style.transition = 'transform 0.38s cubic-bezier(0.34,1.3,0.64,1), opacity 0.26s';
  card.style.transform  = 'scale(0.93) translateY(10px)';
  card.style.opacity    = '0.45';
  setTimeout(()=>{
    card.style.transition = card.style.transform = card.style.opacity = '';
    show();
  }, 230);
});

/* ─────────────────────────────
   SWIPE
───────────────────────────── */
let sX=0, sY=0, dragging=false, curX=0;
const T1=60, T2=110;

function dragStart(x,y){ sX=x; sY=y; dragging=true; curX=0; }
function dragMove(x,y){
  if(!dragging) return;
  const dx=x-sX, dy=y-sY;
  if(Math.abs(dy)>Math.abs(dx)*1.5){ dragging=false; resetCard(); return; }
  curX=dx;
  const r = Math.min(Math.abs(dx)/T2, 1);
  card.style.transform = `translateX(${dx*0.52}px) rotate(${dx*0.036}deg)`;
  if(dx>12){
    labelYes.style.opacity = Math.min(r*1.4,1);
    labelNo.style.opacity  = 0;
    card.style.boxShadow   = `0 0 0 2px rgba(244,114,182,${0.55*r}), 0 24px 70px rgba(0,0,0,0.6), 0 0 50px rgba(190,24,93,${0.18*r})`;
  } else if(dx<-12){
    labelNo.style.opacity  = Math.min(r*1.4,1);
    labelYes.style.opacity = 0;
    card.style.boxShadow   = `0 0 0 2px rgba(148,163,184,${0.4*r}), 0 24px 70px rgba(0,0,0,0.6)`;
  } else {
    labelYes.style.opacity = labelNo.style.opacity = 0;
    card.style.boxShadow = '';
  }
}
function resetCard(){
  labelYes.style.opacity = labelNo.style.opacity = 0;
  card.style.boxShadow   = '';
  card.style.transition  = 'transform 0.48s cubic-bezier(0.34,1.56,0.64,1)';
  card.style.transform   = '';
  setTimeout(()=>card.style.transition='', 480);
}
function dragEnd(){
  if(!dragging) return; dragging=false;
  if(curX>T2)        answer(2);
  else if(curX>T1)   answer(1);
  else if(curX<-T2)  answer(-2);
  else if(curX<-T1)  answer(-1);
  else resetCard();
}

card.addEventListener('touchstart',  e=>dragStart(e.touches[0].clientX,e.touches[0].clientY), {passive:true});
card.addEventListener('touchmove',   e=>dragMove(e.touches[0].clientX,e.touches[0].clientY),  {passive:true});
card.addEventListener('touchend',    dragEnd);
card.addEventListener('mousedown',   e=>{ dragStart(e.clientX,e.clientY); card.style.cursor='grabbing'; });
addEventListener('mousemove', e=>dragMove(e.clientX,e.clientY));
addEventListener('mouseup',   ()=>{ card.style.cursor=''; dragEnd(); });

/* ─────────────────────────────
   CONFIRM DIALOG
───────────────────────────── */
const confirmOverlay = document.getElementById('confirmOverlay');
document.getElementById('topbarLogo').addEventListener('click', e=>{
  if(idx>0){ e.preventDefault(); confirmOverlay.classList.add('show'); }
});
document.getElementById('confirmYes').addEventListener('click', ()=>location.href='quiz.html?restart=1');
document.getElementById('confirmNo').addEventListener('click',  ()=>confirmOverlay.classList.remove('show'));

show();
</script>
<script src="./common.js"></script>
</body>
</html>
